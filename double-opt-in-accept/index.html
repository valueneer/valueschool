<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bestätigt! — Value School</title>
  <meta name="description" content="Deine Email-Adresse ist bestätigt. Deine Werte-Auswertung ist unterwegs.">
  <meta name="robots" content="noindex,follow">

  <!-- Brevo Tracking -->
  <script src="https://cdn.brevo.com/js/sdk-loader.js" async></script>
  <script>
    window.Brevo = window.Brevo || [];
    Brevo.push(["init", { client_key: "5hjjfnj2uicgx2zzxv1lzh36" }]);
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Outfit:wght@400;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    :root {
      --pink: #E91E8C;
      --orange: #F7941D;
      --green: #7CC142;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { min-height: 100%; }
    body {
      font-family: 'Outfit', system-ui, -apple-system, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, var(--green) 0%, #4F8B25 100%);
      color: #fff;
      -webkit-font-smoothing: antialiased;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    .wrap {
      flex: 1;
      display: flex;
      align-items: flex-start;     /* Inhalt nach oben, nicht zentriert */
      justify-content: center;
      padding: clamp(60px, 10vh, 110px) clamp(20px, 5vw, 40px) clamp(40px, 6vh, 80px);
    }
    .card {
      max-width: 620px;
      width: 100%;
      text-align: center;
      position: relative;
    }
    .check-circle {
      width: 96px;
      height: 96px;
      background: rgba(255,255,255,0.18);
      border: 3px solid rgba(255,255,255,0.4);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 22px;
      backdrop-filter: blur(8px);
      animation: pop 0.5s cubic-bezier(0.22, 1.61, 0.36, 1) 0.1s both;
    }
    .check-circle svg {
      width: 54px;
      height: 54px;
      stroke: #fff;
      stroke-width: 4;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-dasharray: 50;
      stroke-dashoffset: 50;
      animation: draw 0.6s ease-out 0.5s forwards;
    }
    @keyframes pop {
      0%   { transform: scale(0.5); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }
    @keyframes draw {
      to { stroke-dashoffset: 0; }
    }
    .badge {
      display: inline-block;
      background: rgba(255,255,255,0.18);
      color: #fff;
      padding: 7px 16px;
      border-radius: 99px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 18px;
      backdrop-filter: blur(6px);
    }
    h1 {
      font-family: 'Bangers', system-ui, sans-serif;
      font-size: clamp(44px, 7.5vw, 72px);
      letter-spacing: 2px;
      line-height: 1;
      margin-bottom: 28px;
      text-transform: uppercase;
    }
    h1 .accent { color: var(--orange); }
    .text {
      font-size: clamp(16px, 2vw, 19px);
      line-height: 1.55;
      color: rgba(255,255,255,0.95);
      margin-bottom: 14px;
      max-width: 520px;
      margin-left: auto;
      margin-right: auto;
    }
    .text:last-child { margin-bottom: 0; }

    .deco {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
    }
    .deco-1 { top: -100px; right: -80px; width: 280px; height: 280px; background: radial-gradient(circle, rgba(247,148,29,0.30), transparent 70%); }
    .deco-2 { bottom: -120px; left: -100px; width: 320px; height: 320px; background: radial-gradient(circle, rgba(255,255,255,0.18), transparent 70%); }

    .card > * { position: relative; z-index: 1; }
  </style>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 100 100%27><polygon points=%2750,5 60,35 92,35 66,55 76,88 50,68 24,88 34,55 8,35 40,35%27 fill=%27%23E91E8C%27 stroke=%27%232E2D8E%27 stroke-width=%273%27/><text x=%2750%27 y=%2762%27 text-anchor=%27middle%27 font-family=%27Arial Black,sans-serif%27 font-size=%2728%27 font-weight=%27900%27 fill=%27%23fff%27>V</text></svg>">
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="deco deco-1"></div>
      <div class="deco deco-2"></div>

      <div class="check-circle">
        <svg viewBox="0 0 60 60">
          <polyline points="14,32 26,44 46,18" />
        </svg>
      </div>

      <span class="badge">Bestätigt</span>
      <h1>Du bist <span class="accent">dabei!</span></h1>

      <p class="text">Damit ist alles bereit und du erhältst gleich deine Werte-Auswertung.</p>
      <p class="text">Schau in den nächsten Minuten in dein Postfach (auch im Spam-Ordner).</p>
      <p class="text">Dort findest du dein Ergebnis und ganz konkrete Schritte, was du damit machen kannst.</p>
    </div>
  </div>
</body>
</html>
