  <script type="text/babel">
const { useState, useEffect, useRef } = React;





var BLUE = "#2E2D8E";
var BLUE_DK = "#1C1B5E";
var PINK = "#E91E8C";
var CYAN = "#00BCD4";
var GREEN = "#7CC142";
var ORANGE = "#F7941D";
var TXT = "#2c2c3a";
var MUTED = "#6b6b80";
var WARM = "#faf8f5";
var HEAD = "'Outfit', system-ui, sans-serif";
var BANG = "'Bangers', 'Outfit', Impact, sans-serif";

/* Starburst SVG component */
function Starburst(props) {
  var pts = props.points || 16;
  var sz = props.size || 200;
  var clr = props.color || PINK;
  var coords = "";
  for (var i = 0; i < pts; i++) {
    var angle = (Math.PI * 2 / pts) * i - Math.PI / 2;
    var r = i % 2 === 0 ? 50 : 24;
    coords += (i === 0 ? "" : " ") + (50 + r * Math.cos(angle)).toFixed(1) + "," + (50 + r * Math.sin(angle)).toFixed(1);
  }
  return (
    <svg viewBox="0 0 100 100" width={sz} height={sz} style={{
      position: "absolute", pointerEvents: "none",
      top: props.top, left: props.left, right: props.right, bottom: props.bottom,
      opacity: props.opacity || 0.12, zIndex: 0,
    }}>
      <polygon points={coords} fill={clr} />
    </svg>
  );
}

/* Number badge with starburst */
function NumBadge(props) {
  return (
    <div style={{ position: "relative", width: 38, height: 38, flexShrink: 0 }}>
      <svg viewBox="0 0 100 100" width={38} height={38} style={{ position: "absolute", top: 0, left: 0 }}>
        <polygon points="50,0 62,30 97,30 70,52 80,88 50,68 20,88 30,52 3,30 38,30" fill={props.color || PINK} />
      </svg>
      <div style={{ position: "absolute", inset: 0, display: "flex", alignItems: "center", justifyContent: "center", color: "#fff", fontSize: 16, fontWeight: 900, fontFamily: HEAD }}>{props.num}</div>
    </div>
  );
}

function FadeIn(props) {
  var d = props.delay || 0;
  var ref = useRef(null);
  var s = useState(false);
  useEffect(function () {
    var el = ref.current;
    if (!el) return;
    var obs = new IntersectionObserver(function (entries) {
      if (entries[0].isIntersecting) s[1](true);
    }, { threshold: 0.08 });
    obs.observe(el);
    return function () { obs.disconnect(); };
  }, []);
  return (
    <div ref={ref} style={{
      opacity: s[0] ? 1 : 0,
      transform: s[0] ? "translateY(0)" : "translateY(22px)",
      transition: "opacity 0.55s ease " + d + "s, transform 0.55s ease " + d + "s",
    }}>
      {props.children}
    </div>
  );
}

function ImgBox(props) {
  var errState = useState(false);
  var hasError = errState[0];
  var setError = errState[1];
  var hasSrc = props.src && !hasError;
  var accent = props.accent || PINK;
  return (
    <div style={{
      aspectRatio: props.ratio || "21/9", borderRadius: 0,
      background: hasSrc ? "#0a0a14" : "linear-gradient(135deg, " + BLUE + "10, " + PINK + "06)",
      display: "flex", alignItems: "flex-end", justifyContent: "flex-start",
      border: "none", overflow: "hidden",
      position: "relative",
      width: "100vw", marginLeft: "calc(50% - 50vw)", marginRight: "calc(50% - 50vw)",
      marginTop: "clamp(40px, 6vw, 70px)", marginBottom: "clamp(40px, 6vw, 70px)",
      boxShadow: "0 24px 60px -16px rgba(28,27,94,0.35)",
    }}>
      {hasSrc ? (
        <React.Fragment>
          <img src={props.src} alt={props.label || ""} onError={function() { setError(true); }} style={{ width: "100%", height: "100%", objectFit: "cover", position: "absolute", inset: 0 }} />
          <div style={{ position: "absolute", inset: 0, background: "linear-gradient(180deg, rgba(0,0,0,0) 35%, rgba(0,0,0,0.45) 75%, rgba(0,0,0,0.75) 100%)", pointerEvents: "none" }} />
          <div style={{ position: "absolute", top: "clamp(20px, 3vw, 40px)", left: "max(24px, calc(50% - 550px))", background: accent, color: "#fff", fontSize: 12, fontWeight: 800, letterSpacing: 2, textTransform: "uppercase", padding: "6px 14px", borderRadius: 99, zIndex: 2 }}>{props.tag || "Realität"}</div>
          {props.quote && (
            <div style={{ position: "relative", zIndex: 1, width: "100%", paddingBottom: "clamp(28px, 5vw, 60px)" }}>
              <div style={{ maxWidth: 1100, margin: "0 auto", padding: "0 24px", color: "#fff" }}>
                <div style={{ fontFamily: BANG, fontSize: "clamp(22px, 3.6vw, 44px)", letterSpacing: 1.5, lineHeight: 1.15, textTransform: "uppercase", textShadow: "0 2px 16px rgba(0,0,0,0.5)", maxWidth: 760 }}>{props.quote}</div>
              </div>
            </div>
          )}
        </React.Fragment>
      ) : (
        <div style={{ textAlign: "center", color: MUTED, fontSize: 14, margin: "auto" }}>
          <div style={{ fontSize: 32, marginBottom: 4 }}>📸</div>
          <div style={{ fontWeight: 600 }}>{props.label || "Bild"}</div>
        </div>
      )}
    </div>
  );
}

/* Small fact callout that gets woven into sections */
function Fact(props) {
  return (
    <div style={{
      background: props.dark ? "rgba(255,255,255,0.08)" : WARM,
      borderRadius: 12, padding: "14px 18px", marginTop: 16,
      borderLeft: "4px solid " + (props.color || CYAN),
    }}>
      <span style={{ fontFamily: BANG, fontSize: 22, letterSpacing: 2, color: props.color || CYAN }}>{props.stat} </span>
      <span style={{ fontSize: 14, color: props.dark ? "rgba(255,255,255,0.7)" : MUTED, lineHeight: 1.6 }}>{props.text}</span>
      {props.src ? <span style={{ display: "block", fontSize: 11, color: props.dark ? "rgba(255,255,255,0.3)" : "#aaa", fontStyle: "italic", marginTop: 4 }}>{"Quelle: " + props.src}</span> : null}
    </div>
  );
}

function ValueSchool() {
  var fs = useState({ name: "", email: "", schule: "", msg: "" });
  var form = fs[0]; var setForm = fs[1];
  var ss = useState(false);
  var sent = ss[0]; var setSent = ss[1];
  var ts = useState(false);
  var showTeam = ts[0]; var setShowTeam = ts[1];
  function go(id) { var el = document.getElementById(id); if (el) el.scrollIntoView({ behavior: "smooth" }); }

  return (
    <div style={{ fontFamily: "'DM Sans', system-ui, sans-serif", color: TXT, overflowX: "hidden" }}>

      {/* ═══════════ NAV ═══════════ */}
      <nav style={{ position: "fixed", top: 0, left: 0, right: 0, zIndex: 100, background: "#000", backdropFilter: "blur(12px)", borderBottom: "none" }}>
        <div style={{ maxWidth: 1100, margin: "0 auto", padding: "10px 24px", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
          <img src={LOGO_COLOR} alt="Value School" style={{ height: 56 }} />
          <div style={{ display: "flex", gap: 18, alignItems: "center" }}>
            {[["Module", "module"]].map(function (item) {
              return <button key={item[1]} onClick={function () { go(item[1]); }} style={{ background: "none", border: "none", color: "rgba(255,255,255,0.7)", fontSize: 14, fontWeight: 500, cursor: "pointer" }}>{item[0]}</button>;
            })}
            <button onClick={function () { go("kontakt"); }} style={{ background: GREEN, color: "#fff", border: "none", borderRadius: 99, padding: "10px 24px", fontSize: 14, fontWeight: 700, cursor: "pointer", fontFamily: HEAD }}>Jetzt anfragen</button>
          </div>
        </div>
      </nav>

      {/* ═══════════ HERO ═══════════ */}
      <section style={{
        minHeight: "92vh", display: "flex", alignItems: "center",
        background: "url('hero.jpg') center 30%/cover no-repeat, " + BLUE_DK,

              <p style={{ fontSize: 15, color: TXT, lineHeight: 1.8, marginBottom: 20 }}>
                Werte sind die Wörter, die beschreiben, wer ein Mensch wirklich ist — jenseits von Noten, Rollen und Erwartungen. <strong style={{ color: BLUE }}>Wer bin ich, wenn alles andere wegfällt?</strong> Wenn Schülerinnen und Schüler diese Wörter für sich finden, beginnen sie, sich selbst zu verstehen.
              </p>
