    // Polyfill for window.storage (not available outside Claude artifacts)
    if (!window.storage) {
      window.storage = {
        async get(key) {
          var v = localStorage.getItem('vs_' + key);
          return v ? { key: key, value: v } : null;
        },
        async set(key, value) {
          localStorage.setItem('vs_' + key, typeof value === 'string' ? value : JSON.stringify(value));
          return { key: key, value: value };
        },
        async delete(key) {
          localStorage.removeItem('vs_' + key);
          return { key: key, deleted: true };
        },
        async list(prefix) {
          var keys = [];
          for (var i = 0; i < localStorage.length; i++) {
            var k = localStorage.key(i);
            if (k.indexOf('vs_' + (prefix || '')) === 0) keys.push(k.replace('vs_', ''));
          }
          return { keys: keys };
        }
      };
    }

const supa = {
  async insert(table, data) {
    if (!USE_SUPABASE) return null;
    const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}`, {
      method: "POST", headers: {
        "Content-Type": "application/json", "apikey": SUPABASE_KEY,
        "Authorization": `Bearer ${SUPABASE_KEY}`, "Prefer": "return=minimal",
      }, body: JSON.stringify(data),
    });
    if (!r.ok) {
      const errText = await r.text().catch(() => "unknown");
      throw new Error(`Supabase ${r.status}: ${errText}`);
    }
    return true;
  },
  async select(table) {
    if (!USE_SUPABASE) return [];
    const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}?select=*&order=created_at.desc`, {
      headers: { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}` },
    });
    if (!r.ok) {
      const errText = await r.text().catch(() => "unknown");
      console.error(`Supabase select error ${r.status}: ${errText}`);
      return [];
    }
    return await r.json();
  },
  async remove(table, id) {
    if (!USE_SUPABASE) return;
    await fetch(`${SUPABASE_URL}/rest/v1/${table}?id=eq.${id}`, {
      method: "DELETE", headers: { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}` },
    });
  },
  async removeAll(table) {
    if (!USE_SUPABASE) return;
    await fetch(`${SUPABASE_URL}/rest/v1/${table}?id=neq.impossible`, {
      method: "DELETE", headers: { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}` },
    });
  },
  async selectTable(table) {
    if (!USE_SUPABASE) return [];
    const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}?select=*`, {
      headers: { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}` },
    });
    if (!r.ok) return [];
    return await r.json();
  },
  async update(table, key, keyVal, data) {
    if (!USE_SUPABASE) return null;
    const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}?${key}=eq.${keyVal}`, {
      method: "PATCH", headers: {
        "Content-Type": "application/json", "apikey": SUPABASE_KEY,
        "Authorization": `Bearer ${SUPABASE_KEY}`, "Prefer": "return=minimal",
      }, body: JSON.stringify(data),
    });
    return r.ok;
  },
};

/* ═══════════════════════════════════════════
   ADMIN LOGIN (Supabase Auth)
   ═══════════════════════════════════════════ */

function AdminLogin({ onSuccess, onBack }) {
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [error, setError] = useState("");
  const [loading, setLoading] = useState(false);

  const login = async () => {
    if (!email || !password) { setError("E-Mail und Passwort eingeben"); return; }
    setLoading(true);
    setError("");
    try {
      const r = await fetch(SUPABASE_URL + "/auth/v1/token?grant_type=password", {
        method: "POST",
        headers: { "Content-Type": "application/json", "apikey": SUPABASE_KEY },
        body: JSON.stringify({ email: email, password: password }),
      });
      const data = await r.json();
      if (!r.ok) {
        setError(data.error_description || data.msg || "Login fehlgeschlagen");
        setLoading(false);
        return;
      }
      onSuccess(data.access_token);
    } catch (e) {
      setError("Verbindungsfehler. Bist du online?");
    }
    setLoading(false);
  };

  return (
    <div style={{ textAlign: "center", padding: "60px 24px" }}>
      <div style={{ fontSize: 48, marginBottom: 12 }}>🔒</div>
      <h2 style={{ fontSize: 22, fontWeight: 800, color: "#1e1b4b", marginBottom: 8 }}>Admin-Zugang</h2>
      <p style={{ color: "#6b7280", fontSize: 14, marginBottom: 24 }}>Mit E-Mail und Passwort anmelden.</p>
      <div style={{ maxWidth: 280, margin: "0 auto 20px" }}>
        <input
          type="email"
          value={email}
          onChange={function(e) { setEmail(e.target.value); setError(""); }}
          onKeyDown={function(e) { if (e.key === "Enter") login(); }}
          placeholder="E-Mail"
          style={{
            width: "100%", padding: "12px 16px", fontSize: 16,
            borderRadius: 12, border: "2px solid #e5e7eb",
            outline: "none", boxSizing: "border-box", marginBottom: 10,
          }}
        />
        <input
          type="password"
          value={password}
          onChange={function(e) { setPassword(e.target.value); setError(""); }}
          onKeyDown={function(e) { if (e.key === "Enter") login(); }}
          placeholder="Passwort"
          style={{
            width: "100%", padding: "12px 16px", fontSize: 16,
            borderRadius: 12, border: error ? "2px solid #ef4444" : "2px solid #e5e7eb",
            outline: "none", boxSizing: "border-box",
          }}
        />
        {error && <p style={{ color: "#ef4444", fontSize: 13, fontWeight: 600, marginTop: 8 }}>{error}</p>}
      </div>
      <div style={{ display: "flex", gap: 10, justifyContent: "center" }}>
        <Btn primary onClick={login} disabled={loading}>{loading ? "..." : "Anmelden"}</Btn>
        <Btn small onClick={onBack}>← Zurück</Btn>
      </div>
    </div>
  );
}

function AdminPanel({ values, setValues, onClose, onDashboard, typeDescs, setTypeDescs, valueDescs, setValueDescs }) {
  const [newName, setNewName] = useState("");
  const [newCat, setNewCat] = useState("orange");
  const [editIdx, setEditIdx] = useState(null);
  const [editName, setEditName] = useState("");
  const [editCat, setEditCat] = useState("orange");
  const [filter, setFilter] = useState("all");
  const [saving, setSaving] = useState(false);
  const [msg, setMsg] = useState("");

  const save = async (newVals) => {
    setValues(newVals);
    setSaving(true);
    try {
      await window.storage.set(STORAGE_KEY, JSON.stringify(newVals));
      setMsg(`✅ Gespeichert · ${newVals.length} Werte`);
    } catch(e) {
      setMsg("⚠️ Speichern fehlgeschlagen");
    }
    setSaving(false);
    setTimeout(() => setMsg(""), 2000);
  };

  const addValue = () => {
    if (!newName.trim()) return;
    if (values.find(v => v.name.toLowerCase() === newName.trim().toLowerCase())) {
      setMsg("⚠️ Wert existiert bereits"); setTimeout(() => setMsg(""), 2000); return;
    }
    save([...values, { name: newName.trim(), cat: newCat }]);
    setNewName("");
  };

  const deleteValue = (idx) => {
    const nv = values.filter((_, i) => i !== idx);
    save(nv);
  };

  const startEdit = (idx) => {
    setEditIdx(idx);
    setEditName(values[idx].name);
    setEditCat(values[idx].cat);
  };

  const saveEdit = () => {
    const nv = [...values];
    nv[editIdx] = { name: editName.trim(), cat: editCat };
    save(nv);
    setEditIdx(null);
  };

  const resetDefaults = () => {
    if (confirm("Alle Werte auf Standard zurücksetzen? Änderungen gehen verloren.")) {
      save([...DEFAULT_VALUES]);
    }
  };

  const filtered = filter === "all" ? values : values.filter(v => v.cat === filter);
  const counts = { orange: 0, pink: 0, blue: 0, green: 0 };
  values.forEach(v => { if (counts[v.cat] !== undefined) counts[v.cat]++; });

  const selectStyle = {
    padding: "8px 12px", borderRadius: 8, border: "2px solid #e5e7eb",
    fontSize: 14, background: "#fff", cursor: "pointer", outline: "none",
  };
  const inputStyle = {
    padding: "10px 14px", borderRadius: 10, border: "2px solid #e5e7eb",
    fontSize: 15, outline: "none", width: "100%", boxSizing: "border-box",
  };

  return (
    <div style={{ padding: "20px 16px", maxWidth: 500, margin: "0 auto" }}>
      {/* Header */}
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
        <div>
          <h2 style={{ fontSize: 22, fontWeight: 800, color: "#1e1b4b", margin: 0 }}>⚙️ Admin</h2>
          <p style={{ fontSize: 13, color: "#6b7280", margin: "4px 0 0" }}>{values.length} Werte gesamt</p>
        </div>
        <div style={{ display: "flex", gap: 8 }}>
          <Btn small primary onClick={onDashboard}>📊 Dashboard</Btn>
          <Btn small onClick={onClose}>← Zurück</Btn>
        </div>
      </div>

      {msg && (
        <div style={{
          background: msg.startsWith("✅") ? "#f0fdf4" : "#fef3c7",
          color: msg.startsWith("✅") ? "#166534" : "#92400e",
          padding: "8px 16px", borderRadius: 10, fontSize: 13, fontWeight: 600, marginBottom: 16, textAlign: "center",
        }}>{msg}</div>
      )}

      {/* Stats */}
      <div style={{ display: "flex", gap: 8, marginBottom: 20, flexWrap: "wrap" }}>
        {Object.entries(counts).map(([cat, n]) => (
          <div key={cat} onClick={() => setFilter(filter === cat ? "all" : cat)} style={{
            background: filter === cat ? CAT[cat].bg : "#f8fafc",
            color: filter === cat ? "#fff" : "#374151",
            padding: "6px 14px", borderRadius: 99, fontSize: 13, fontWeight: 600,
            cursor: "pointer", border: `2px solid ${CAT[cat].bg}30`,
          }}>
            {cat === "orange" ? "🟠" : cat === "pink" ? "🩷" : cat === "blue" ? "🔵" : "🟢"} {n}
          </div>
        ))}
        <div onClick={() => setFilter("all")} style={{
          background: filter === "all" ? "#1e1b4b" : "#f8fafc",
          color: filter === "all" ? "#fff" : "#374151",
          padding: "6px 14px", borderRadius: 99, fontSize: 13, fontWeight: 600, cursor: "pointer",
        }}>Alle</div>
      </div>

      {/* Add new */}
      <div style={{ background: "#f8fafc", borderRadius: 14, padding: 16, marginBottom: 20 }}>
        <div style={{ fontSize: 13, fontWeight: 700, color: "#1e1b4b", marginBottom: 10 }}>Neuen Wert hinzufügen</div>
        <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
          <input
            value={newName} onChange={e => setNewName(e.target.value)}
            onKeyDown={e => e.key === "Enter" && addValue()}
            placeholder="Name des Werts..."
            style={{ ...inputStyle, flex: 1, minWidth: 140 }}
          />
          <select value={newCat} onChange={e => setNewCat(e.target.value)} style={selectStyle}>
            {CAT_OPTIONS.map(o => <option key={o.id} value={o.id}>{o.label}</option>)}
          </select>
          <Btn small primary onClick={addValue}>+ Hinzufügen</Btn>
        </div>
      </div>

      {/* Values list */}
      <div style={{ marginBottom: 20 }}>
        {filtered.map((v, displayIdx) => {
          const realIdx = values.findIndex(val => val.name === v.name && val.cat === v.cat);
          const isEditing = editIdx === realIdx;

          return (
            <div key={`${v.name}-${realIdx}`} style={{
              display: "flex", alignItems: "center", gap: 8, padding: "10px 12px",
              borderBottom: "1px solid #f3f4f6", background: isEditing ? "#f0f0ff" : "transparent",
            }}>
              <div style={{
                width: 10, height: 10, borderRadius: 3, background: CAT[v.cat].bg, flexShrink: 0,
              }} />

              {isEditing ? (
                <>
                  <input value={editName} onChange={e => setEditName(e.target.value)}
                    style={{ ...inputStyle, flex: 1, padding: "6px 10px", fontSize: 14 }}
                    onKeyDown={e => e.key === "Enter" && saveEdit()}
                  />
                  <select value={editCat} onChange={e => setEditCat(e.target.value)}
                    style={{ ...selectStyle, padding: "6px 8px", fontSize: 12 }}>
                    {CAT_OPTIONS.map(o => <option key={o.id} value={o.id}>{o.label}</option>)}
                  </select>
                  <Btn small primary onClick={saveEdit}>✓</Btn>
                  <Btn small onClick={() => setEditIdx(null)}>✕</Btn>
                </>
              ) : (
                <>
                  <div style={{ flex: 1, fontSize: 15, fontWeight: 600, color: "#1e1b4b" }}>{v.name}</div>
                  <span style={{ fontSize: 11, color: "#9ca3af" }}>{CAT[v.cat].label}</span>
                  <button onClick={() => startEdit(realIdx)} style={{
                    background: "none", border: "none", cursor: "pointer", fontSize: 16, padding: 4,
                  }}>✏️</button>
                  <button onClick={() => deleteValue(realIdx)} style={{
                    background: "none", border: "none", cursor: "pointer", fontSize: 16, padding: 4,
                  }}>🗑️</button>
                </>
              )}
            </div>
          );
        })}
      </div>

      </div>

        <div style={{
          background: "#fef3c7", color: "#92400e", padding: "10px 16px",
          borderRadius: 10, fontSize: 13, fontWeight: 600, marginTop: 16, textAlign: "center",
        }}>
          ⚠️ Ungerade Anzahl ({values.length}) — das Spiel braucht eine gerade Anzahl Werte!
        </div>
      )}

      {/* Wertetypen-Texte bearbeiten */}
      <TypeDescEditor typeDescs={typeDescs} setTypeDescs={setTypeDescs} />
      <ValueDescEditor valueDescs={valueDescs} setValueDescs={setValueDescs} />

}

/* ═══════════════════════════════════════════
   PHOTO SCAN (Card Recognition via Claude API)
   ═══════════════════════════════════════════ */

const ALL_VALUE_NAMES = Object.values(ALL_VALUES_BY_CAT).flat();
const VALUE_TO_CAT = {};
Object.entries(ALL_VALUES_BY_CAT).forEach(([cat, vals]) => {
  vals.forEach(v => { VALUE_TO_CAT[v.toLowerCase()] = cat; });
});

function PhotoScan({ onResult, onBack }) {
  const [img, setImg] = useState(null);
  const [imgData, setImgData] = useState(null);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);
  const [recognized, setRecognized] = useState(null);
  const fileRef = useRef(null);

  const handleFile = (file) => {
    if (!file) return;
    setError(null); setRecognized(null);
    const url = URL.createObjectURL(file);
    setImg(url);

    const reader = new FileReader();
    reader.onload = () => {
      const b64 = reader.result.split(",")[1];
      setImgData({ data: b64, type: file.type || "image/jpeg" });
    };
    reader.readAsDataURL(file);
  };

  const handleCapture = (e) => {
    const file = e.target.files?.[0];
    if (file) handleFile(file);
  };

  const analyze = async () => {
    if (!imgData) return;
    setLoading(true); setError(null);

    const valuesList = ALL_VALUE_NAMES.join(", ");

    try {
      const resp = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1000,
          messages: [{
            role: "user",
            content: [
              {
                type: "image",
                source: { type: "base64", media_type: imgData.type, data: imgData.data }
              },
              {
                type: "text",
                text: `Du siehst ein Foto von Valueverse-Wertekarten. Jede Karte hat einen Wert-Namen darauf.

Erkenne ALLE Werte-Namen die auf den sichtbaren Karten stehen. Die möglichen Werte sind:
${valuesList}

Antworte NUR mit einem JSON-Array der erkannten Werte-Namen, exakt wie oben geschrieben. Beispiel:
["Freiheit", "Mut", "Familie", "Ehrlichkeit", "Kreativität", "Harmonie", "Authentizität", "Empathie"]

Wenn du einen Wert nicht sicher lesen kannst, lass ihn weg. Antworte NUR mit dem JSON-Array, kein anderer Text.`
              }
            ]
          }]
        })
      });

      const data = await resp.json();
      const text = data.content?.map(c => c.text || "").join("") || "";
      const clean = text.replace(/```json|```/g, "").trim();

      let parsed;
      try { parsed = JSON.parse(clean); } catch {
        setError("Konnte die Antwort nicht verarbeiten. Bitte nochmal versuchen.");
        setLoading(false); return;
      }

      if (!Array.isArray(parsed) || parsed.length === 0) {
        setError("Keine Werte erkannt. Bitte ein deutlicheres Foto machen.");
        setLoading(false); return;
      }

      // Match to known values
      const matched = [];
      parsed.forEach(name => {
        const lower = name.toLowerCase().trim();
        const cat = VALUE_TO_CAT[lower];
        if (cat) {
          // Find exact name from our list
          const exact = ALL_VALUE_NAMES.find(v => v.toLowerCase() === lower);
          if (exact && !matched.find(m => m.name === exact)) {
            matched.push({ name: exact, cat });
          }
        }
      });

      if (matched.length === 0) {
        setError("Keine bekannten Valueverse-Werte erkannt. Bitte Karten deutlich fotografieren.");
      } else {
        setRecognized(matched);
      }
    } catch (e) {
      setError("API-Fehler: " + (e.message || "Unbekannt"));
    }
    setLoading(false);
  };

  const handleConfirm = () => {
    if (recognized) onResult(recognized);
  };

  return (
    <div style={{ textAlign: "center", padding: "20px 16px" }}>
      <div style={{ fontSize: 36, marginBottom: 8 }}>📸</div>
      <h2 style={{ fontSize: 22, fontWeight: 800, color: "#1e1b4b", marginBottom: 4 }}>Wertekompass scannen</h2>
      <p style={{ color: "#6b7280", fontSize: 14, marginBottom: 20, lineHeight: 1.5 }}>
        Fotografiere deine 8 Karten (Wertekompass).<br />Die Werte werden automatisch erkannt.
      </p>

      {!img ? (
        <div style={{ display: "flex", flexDirection: "column", gap: 16, alignItems: "center" }}>
          {/* Fully visible native file input */}
          <div style={{
            background: "#f8fafc", borderRadius: 16, padding: 24,
            width: "100%", maxWidth: 320, textAlign: "center",
          }}>
            <div style={{ fontSize: 40, marginBottom: 8 }}>📷</div>
            <p style={{ fontSize: 14, color: "#374151", fontWeight: 600, marginBottom: 12 }}>
              Foto auswählen:
            </p>
            <input
              type="file"
              accept="image/*"
              onChange={handleCapture}
              style={{
                fontSize: 15, width: "100%", padding: 8,
                cursor: "pointer",
              }}
            />
          </div>

          {/* Paste from clipboard area */}
          <div
            contentEditable
            onPaste={(e) => {
              e.preventDefault();
              const items = e.clipboardData?.items;
              if (!items) return;
              for (let i = 0; i < items.length; i++) {
                if (items[i].type.startsWith("image/")) {
                  const file = items[i].getAsFile();
                  if (file) handleFile(file);
                  break;
                }
              }
            }}
            style={{
              background: "#f0f9ff", border: "2px dashed #93c5fd", borderRadius: 16,
              padding: "20px 16px", width: "100%", maxWidth: 320,
              color: "#3b82f6", fontSize: 14, fontWeight: 600, textAlign: "center",
              outline: "none", cursor: "text", minHeight: 60,
            }}
            suppressContentEditableWarning
          >
            📋 Oder hier antippen und Bild einfügen (Strg+V)
          </div>

          <Btn small onClick={onBack}>← Zurück</Btn>
        </div>
      ) : !recognized ? (
        <div>
          <img src={img} alt="Karten" style={{
            width: "100%", maxWidth: 400, borderRadius: 16,
            border: "2px solid #e5e7eb", marginBottom: 16,
          }} />

          {loading ? (
            <div style={{ padding: 20 }}>
              <div style={{
                width: 40, height: 40, border: "4px solid #e5e7eb",
                borderTopColor: "#6366f1", borderRadius: "50%",
                margin: "0 auto 12px",
                animation: "spin 0.8s linear infinite",
              }} />
              <style>{`@keyframes spin { to { transform: rotate(360deg); } }`}</style>
              <p style={{ color: "#6b7280", fontSize: 14 }}>Erkenne Werte auf den Karten...</p>
            </div>
          ) : (
            <div style={{ display: "flex", gap: 10, justifyContent: "center", flexWrap: "wrap" }}>
              <Btn primary onClick={analyze}>🔍 Werte erkennen</Btn>
              <Btn onClick={() => { setImg(null); setImgData(null); setError(null); }}>🔄 Neues Foto</Btn>
            </div>
          )}

          {error && (
            <div style={{
              background: "#fef2f2", color: "#b91c1c", padding: "12px 16px",
              borderRadius: 12, fontSize: 13, fontWeight: 600, marginTop: 16,
            }}>⚠️ {error}</div>
          )}
        </div>
      ) : (
        <div>
          <div style={{
            background: "#f0fdf4", color: "#166534", padding: "10px 16px",
            borderRadius: 10, fontSize: 14, fontWeight: 600, marginBottom: 16,
          }}>✅ {recognized.length} Werte erkannt!</div>

          <div style={{ display: "flex", flexWrap: "wrap", gap: 8, justifyContent: "center", marginBottom: 20 }}>
            {recognized.map(v => <VCard key={v.name} value={v} size="small" />)}
          </div>

          {recognized.length !== 8 && (
            <div style={{
              background: "#fef3c7", color: "#92400e", padding: "10px 16px",
              borderRadius: 10, fontSize: 13, fontWeight: 600, marginBottom: 16,
            }}>
              ⚠️ {recognized.length} statt 8 Werte erkannt.
              {recognized.length < 8 ? " Fehlende Werte kannst du im nächsten Schritt ergänzen." : " Entferne überzählige im nächsten Schritt."}
            </div>
          )}

          <div style={{ display: "flex", gap: 10, justifyContent: "center", flexWrap: "wrap" }}>
            <Btn primary onClick={handleConfirm}>
              Weiter zum Wertekompass →
            </Btn>
            <Btn onClick={() => { setImg(null); setImgData(null); setRecognized(null); setError(null); }}>
              📷 Nochmal scannen
            </Btn>
          </div>
        </div>
      )}
    </div>
  );
}

function Compare({ pile, roundNum, onDone, valueDescs }) {
  const [pairs, setPairs] = useState([]);
  const [idx, setIdx] = useState(0);
  const [displayW, setDisplayW] = useState(0);
  const [displayL, setDisplayL] = useState(0);
  const [anim, setAnim] = useState(null);
  const [showIntro, setShowIntro] = useState(roundNum === 1);
  const [infoValue, setInfoValue] = useState(null);
  const pickLock = useRef(false);
  const winnersRef = useRef([]);
  const losersRef = useRef([]);

  useEffect(() => {
    pickLock.current = false;
    const sh = shuffle(pile); const p = []; let odd = null;
    for (let i = 0; i < sh.length; i += 2) {
      if (i + 1 < sh.length) p.push([sh[i], sh[i + 1]]);
      else odd = sh[i];
    }
    setPairs(p); setIdx(0);
    winnersRef.current = odd ? [odd] : [];
    losersRef.current = [];
    setDisplayW(winnersRef.current.length);
    setDisplayL(0);
  }, [pile]);

  const pick = (wi) => {
    if (pickLock.current) return;
    const pair = pairs[idx];
    if (!pair) return;
    pickLock.current = true;
    setInfoValue(null);
    setAnim(wi === 0 ? "L" : "R");
    const winner = pair[wi];
    const loser = pair[1 - wi];
    const currentIdx = idx;
    setTimeout(() => {
      setAnim(null);
      winnersRef.current.push(winner);
      losersRef.current.push(loser);
      setDisplayW(winnersRef.current.length);
      setDisplayL(losersRef.current.length);
      if (currentIdx + 1 >= pairs.length) {
        onDone([...winnersRef.current], [...losersRef.current]);
      } else {
        setIdx(i => i + 1);
      }
      pickLock.current = false;
    }, 200);
  };

  if (showIntro) return (
    <div style={{ textAlign: "center", padding: "40px 24px" }}>
      <div style={{ fontSize: 48, marginBottom: 12 }}>🎮</div>
      <h2 style={{ fontSize: 24, fontWeight: 900, color: "#2E2D8E", marginBottom: 12 }}>Bereit? Los geht's!</h2>
      <div style={{
        background: "linear-gradient(135deg, #f8fafc, #f0f0ff)", borderRadius: 18,
        padding: "20px 22px", maxWidth: 340, margin: "0 auto 20px", textAlign: "left",
        border: "1px solid rgba(46,45,142,0.08)",
      }}>
        {[
          ["🎯", "Dir werden immer zwei Werte gezeigt. Tippe auf den, der dir wichtiger ist."],
          ["💛", "Entscheide aus dem Bauch heraus — welcher Wert bist du WIRKLICH? Nicht welchen du gerne hättest."],
          ["😅", "Manche Entscheidungen fühlen sich fast unmöglich an. Das gehört dazu! Gerade dann lernst du am meisten über dich."],
          ["🎲", "Das hier ist ein Spiel, kein Test. Es gibt keine falschen Antworten — nur deine."],
        ].map(function(item, i) {
          return (
            <div key={i} style={{ display: "flex", gap: 10, marginBottom: i < 3 ? 14 : 0, fontSize: 13, color: "#4b5563", lineHeight: 1.55 }}>
              <span style={{ fontSize: 17, flexShrink: 0, marginTop: 1 }}>{item[0]}</span>
              <span>{item[1]}</span>
            </div>
          );
        })}
      </div>
      <p style={{ fontSize: 12, color: "#9ca3af", maxWidth: 280, margin: "0 auto 24px", lineHeight: 1.5 }}>
        Tipp: Wenn du bei einem Wert denkst "den MUSS ich nehmen" — hinterfrage das. Ist es wirklich deiner, oder glaubst du das nur?
      </p>
      <button onClick={function() { setShowIntro(false); }} style={{
        background: "linear-gradient(135deg, #2E2D8E, #3b2d8e)",
        color: "#fff", border: "none", borderRadius: 99, padding: "16px 44px",
        fontSize: 18, fontWeight: 800, cursor: "pointer",
        boxShadow: "0 6px 24px rgba(46,45,142,0.3)",
      }}>Spiel starten</button>
    </div>
  );

  if (!pairs.length || !pairs[idx]) return null;
  const pair = pairs[idx];

  return (
    <div style={{ textAlign: "center", padding: "20px 16px" }}>
      <Bar pct={(idx / pairs.length) * 100} label={"Runde " + roundNum} sub={(idx + 1) + " / " + pairs.length} />
      <p style={{ color: "#6b7280", fontSize: 15, marginBottom: 28 }}>Welcher Wert ist dir <strong>wichtiger</strong>?</p>
      <div style={{ display: "flex", gap: 16, justifyContent: "center", alignItems: "stretch", minHeight: 120 }}>
        {pair.map((v, i) => (
          <div key={v.name} style={{
            width: "42%", transition: "all 0.22s ease",
            transform: anim === "L" && i === 0 ? "scale(1.08)" : anim === "R" && i === 1 ? "scale(1.08)" : anim ? "scale(0.88)" : "none",
            opacity: (anim === "L" && i === 1) || (anim === "R" && i === 0) ? 0.25 : 1,
            display: "flex", position: "relative",
          }}>
            <VCard value={v} onClick={() => pick(i)} hideLabel />
            {(valueDescs || VALUE_DEF)[v.name] && <button onClick={function(e) { e.stopPropagation(); setInfoValue(infoValue === v.name ? null : v.name); }} style={{
              position: "absolute", top: -6, right: -6, width: 24, height: 24, borderRadius: 99,
              background: "#fff", border: "2px solid #e5e7eb", color: "#6b7280",
              fontSize: 13, fontWeight: 800, cursor: "pointer", display: "flex",
              alignItems: "center", justifyContent: "center", zIndex: 2, padding: 0,
              boxShadow: "0 2px 8px rgba(0,0,0,0.1)",
            }}>?</button>}
          </div>
        ))}
      </div>

      {infoValue && (valueDescs || VALUE_DEF)[infoValue] && (
        <div style={{
          marginTop: 16, background: "#f8fafc", borderRadius: 16, padding: "16px 20px",
          border: "1px solid #e5e7eb", textAlign: "left", maxWidth: 360, margin: "16px auto 0",
          position: "relative",
        }}>
          <button onClick={function() { setInfoValue(null); }} style={{
            position: "absolute", top: 8, right: 12, background: "none", border: "none",
            fontSize: 18, color: "#9ca3af", cursor: "pointer",
          }}>×</button>
          <div style={{ fontWeight: 800, color: "#2E2D8E", fontSize: 16, marginBottom: 6 }}>{infoValue}</div>
          <p style={{ fontSize: 14, color: "#4b5563", lineHeight: 1.6, margin: "0 0 10px" }}>{(valueDescs || VALUE_DEF)[infoValue]}</p>
          <p style={{ fontSize: 11, color: "#9ca3af", lineHeight: 1.4, margin: 0, fontStyle: "italic" }}>
            Das ist nur ein Anhaltspunkt. Es ist völlig ok, wenn dieser Wert für dich persönlich etwas anderes bedeutet — Werte sind so individuell wie wir Menschen.
          </p>
        </div>
      )}

      <div style={{ marginTop: 16, fontSize: 12, color: "#b0b0b0" }}>Noch {pairs.length - idx - 1} Vergleiche</div>
      <div style={{ marginTop: 14, display: "flex", justifyContent: "center", gap: 6 }}>
        <span style={{ background: "#e0e7ff", color: "#4338ca", padding: "4px 12px", borderRadius: 99, fontSize: 12, fontWeight: 600 }}>✅ {displayW}</span>
        <span style={{ background: "#fef2f2", color: "#b91c1c", padding: "4px 12px", borderRadius: 99, fontSize: 12, fontWeight: 600 }}>❌ {displayL}</span>
      </div>
    </div>
  );
}

function JokerPick({ losers, winnerCount, onDone }) {
  const [sel, setSel] = useState([]);
  const maxJ = 4;
  const total = winnerCount + sel.length;

  const toggle = v => {
    const already = sel.find(s => s.name === v.name);
    if (already) {
      setSel(sel.filter(s => s.name !== v.name));
    } else if (sel.length < maxJ) {
      setSel([...sel, v]);
    }
  };

  return (
    <div style={{ textAlign: "center", padding: "20px 16px" }}>
      <div style={{ fontSize: 36, marginBottom: 8 }}>🃏</div>
      <h2 style={{ fontSize: 22, fontWeight: 800, color: "#2E2D8E", marginBottom: 4 }}>Joker wählen</h2>
      <p style={{ color: "#6b7280", fontSize: 13, marginBottom: 12, lineHeight: 1.5, maxWidth: 320, margin: "0 auto 12px" }}>
        Es kann sein, dass zwei deiner wichtigsten Werte gegeneinander angetreten sind. Hol bis zu {maxJ} Werte zurück — oder geh direkt weiter.
      </p>
      <div style={{
        display: "inline-flex", gap: 8, marginBottom: 16, fontSize: 13,
        background: "#f0fdf4", color: "#166534",
        padding: "8px 16px", borderRadius: 99, fontWeight: 600,
      }}>
        <span>{total} Werte in der nächsten Runde</span>
        {sel.length > 0 && <span>(+{sel.length} Joker)</span>}
      </div>
      <div style={{
        display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8,
        marginBottom: 20, padding: "0 4px",
      }}>
        {losers.map(function(v) {
          var isSel = !!sel.find(function(s) { return s.name === v.name; });
          var blocked = !isSel && sel.length >= maxJ;
          var c = CAT[v.cat];
          return (
            <div key={v.name} onClick={function() { if (!blocked) toggle(v); }}
              style={{
                padding: "12px 6px", borderRadius: 12, textAlign: "center",
                fontSize: 13, fontWeight: 700, cursor: blocked ? "default" : "pointer",
                background: isSel ? "linear-gradient(140deg," + c.bg + "ee," + c.bg + ")" : blocked ? "#f0f0f0" : "#fff",
                color: isSel ? "#fff" : blocked ? "#ccc" : c.bg,
                border: isSel ? "3px solid #1e1b4b" : "2px solid " + (blocked ? "#e5e7eb" : c.bg + "40"),
                transition: "all 0.15s ease",
                transform: isSel ? "scale(1.05)" : "scale(1)",
                opacity: blocked ? 0.4 : 1,
                hyphens: "auto", WebkitHyphens: "auto",
              }}
              lang="de"
            >
              {v.name}
            </div>
          );
        })}
      </div>
      <div style={{ display: "flex", gap: 12, justifyContent: "center", flexWrap: "wrap" }}>
        <Btn primary onClick={function() { onDone(sel); }}>
          {sel.length > 0 ? "Mit " + sel.length + " Joker" + (sel.length > 1 ? "n" : "") + " weiter →" : "Ohne Joker weiter →"}
        </Btn>
      </div>
    </div>
  );
}

function FinalAdjust({ values8, lastDiscards, onDone }) {
  const [cur, setCur] = useState([...values8]);
  const [pool, setPool] = useState(lastDiscards);
  const [swapSrc, setSwapSrc] = useState(null);

  const tapCurrent = v => {
    if (swapSrc && swapSrc.from === "pool") {
      // Swap
      setCur(cur.map(c => c.name === v.name ? swapSrc.val : c));
      setPool(pool.map(p => p.name === swapSrc.val.name ? v : p));
      setSwapSrc(null);
    } else if (cur.length > 8) {
      // Remove from current (too many)
      setCur(cur.filter(c => c.name !== v.name));
      setPool([v, ...pool]);
    } else {
      setSwapSrc({ from: "current", val: v });
    }
  };
  const tapPool = v => {
    if (swapSrc && swapSrc.from === "current") {
      // Swap
      setCur(cur.map(c => c.name === swapSrc.val.name ? v : c));
      setPool(pool.map(p => p.name === v.name ? swapSrc.val : p));
      setSwapSrc(null);
    } else if (cur.length < 8) {
      // Add from pool (too few)
      setCur([...cur, v]);
      setPool(pool.filter(p => p.name !== v.name));
    } else {
      setSwapSrc({ from: "pool", val: v });
    }
  };

  const hint = cur.length < 8
    ? `Noch ${8 - cur.length} Werte hinzufügen — tippe unten auf fehlende Werte.`
    : cur.length > 8
    ? `${cur.length - 8} zu viel — tippe oben auf Werte die raus sollen.`
    : null;

  return (
    <div style={{ textAlign: "center", padding: "20px 16px" }}>
      <div style={{ fontSize: 36, marginBottom: 8 }}>🔄</div>
      <h2 style={{ fontSize: 22, fontWeight: 800, color: "#2E2D8E", marginBottom: 8 }}>Feinschliff</h2>
      <p style={{ color: "#6b7280", fontSize: 13, marginBottom: 16, lineHeight: 1.6, maxWidth: 320, margin: "0 auto 16px" }}>
        {cur.length === 8 && !swapSrc
          ? "Das sind deine Top-Werte! Passt alles? Wenn nicht: Tippe oben einen Wert an, dann unten den Ersatz."
          : cur.length > 8
          ? "Noch zu viele! Tippe oben auf Werte die raus sollen."
          : cur.length < 8
          ? "Zu wenige! Tippe unten auf Werte die dazu sollen."
          : "Tippe jetzt " + (swapSrc.from === "current" ? "unten" : "oben") + " den Tauschpartner an."}
      </p>
      {swapSrc && (
        <div style={{ background: "#e0e7ff", color: "#3730a3", padding: "10px 16px", borderRadius: 12, fontSize: 14, marginBottom: 16, fontWeight: 600, display: "inline-flex", alignItems: "center", gap: 8 }}>
          🔄 <strong>{swapSrc.val.name}</strong> → jetzt {swapSrc.from === "current" ? "Ersatz unten" : "Platz oben"} antippen
          <span onClick={() => setSwapSrc(null)} style={{ cursor: "pointer", opacity: 0.5, fontSize: 18, lineHeight: 1 }}>✕</span>
        </div>
      )}
      {hint && !swapSrc && (
        <div style={{ background: "#fef3c7", color: "#92400e", padding: "8px 16px", borderRadius: 10, fontSize: 13, fontWeight: 600, marginBottom: 12 }}>
          ⚠️ {hint}
        </div>
      )}
      <div style={{ fontSize: 11, textTransform: "uppercase", letterSpacing: 2, color: "#2E2D8E", marginBottom: 10, fontWeight: 700 }}>
        Deine Werte ({cur.length}/8)
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginBottom: 24 }}>
        {cur.map(function(v) {
          var c = CAT[v.cat];
          var isSel = swapSrc?.from === "current" && swapSrc?.val.name === v.name;
          var isTarget = swapSrc?.from === "pool";
          return (
            <div key={v.name} onClick={function() { tapCurrent(v); }} style={{
              padding: "14px 10px", borderRadius: 14, textAlign: "center",
              fontSize: 15, fontWeight: 800, cursor: "pointer",
              background: isSel ? "#1e1b4b" : "linear-gradient(140deg," + c.bg + "ee," + c.bg + ")",
              color: "#fff",
              border: isSel ? "3px solid #1e1b4b" : isTarget ? "3px dashed rgba(255,255,255,0.5)" : "3px solid transparent",
              transform: isSel ? "scale(1.05)" : "scale(1)",
              transition: "all 0.15s ease",
              boxShadow: "0 4px 16px " + c.glow,
              hyphens: "auto", WebkitHyphens: "auto",
              animation: isTarget && !isSel ? "pulse 1.5s infinite" : "none",
            }} lang="de">
              {v.name}
            </div>
          );
        })}
      </div>
      {pool.length > 0 && (<>
        <div style={{ fontSize: 11, textTransform: "uppercase", letterSpacing: 2, color: "#9ca3af", marginBottom: 10, fontWeight: 600 }}>
          Abgelegt — antippen zum Tauschen
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 6, marginBottom: 28 }}>
          {pool.map(function(v) {
            var c = CAT[v.cat];
            var isSel = swapSrc?.from === "pool" && swapSrc?.val.name === v.name;
            var isTarget = swapSrc?.from === "current";
            return (
              <div key={v.name} onClick={function() { tapPool(v); }} style={{
                padding: "8px 6px", borderRadius: 10, textAlign: "center",
                fontSize: 12, fontWeight: 600, cursor: "pointer",
                background: isSel ? c.bg + "30" : "#f8f8f8",
                color: c.bg,
                border: isSel ? "2px solid " + c.bg : isTarget ? "2px dashed " + c.bg + "60" : "2px solid #e5e7eb",
                transition: "all 0.15s ease",
                hyphens: "auto", WebkitHyphens: "auto",
              }} lang="de">
                {v.name}
              </div>
            );
          })}
        </div>
      </>)}
      <Btn primary onClick={() => onDone(cur)} disabled={cur.length !== 8}>
        {cur.length === 8 ? "Das sind meine 8 Werte ✓" : `Noch ${Math.abs(8 - cur.length)} ${cur.length < 8 ? "hinzufügen" : "entfernen"}`}
      </Btn>
    </div>
  );
}

function RankValues({ values8, onDone }) {
  const [ranked, setRanked] = useState([...values8]);
  const [dragIdx, setDragIdx] = useState(null);
  const [overIdx, setOverIdx] = useState(null);
  const listRef = useRef(null);
  const touchStartY = useRef(null);
  const touchStartIdx = useRef(null);
  const [deepPinOpen, setDeepPinOpen] = useState(false);
  const [deepPin, setDeepPin] = useState("");
  const [deepPinError, setDeepPinError] = useState(false);
  const DEEP_PIN = "TIEFER";

  const moveItem = (from, to) => {
    if (from === to || from == null || to == null) return;
    const arr = [...ranked];
    const item = arr.splice(from, 1)[0];
    arr.splice(to, 0, item);
    setRanked(arr);
  };

  // Mouse drag
  const onDragStart = (e, idx) => {
    setDragIdx(idx);
    e.dataTransfer.effectAllowed = "move";
  };
  const onDragOver = (e, idx) => {
    e.preventDefault();
    setOverIdx(idx);
  };
  const onDragEnd = () => {
    if (dragIdx != null && overIdx != null) moveItem(dragIdx, overIdx);
    setDragIdx(null); setOverIdx(null);
  };

  // Touch drag
  const onTouchStart = (e, idx) => {
    touchStartY.current = e.touches[0].clientY;
    touchStartIdx.current = idx;
    setDragIdx(idx);
  };
  const onTouchMove = (e) => {
    if (touchStartIdx.current == null || !listRef.current) return;
    var y = e.touches[0].clientY;
    var items = listRef.current.children;
    for (var i = 0; i < items.length; i++) {
      var rect = items[i].getBoundingClientRect();
      if (y > rect.top && y < rect.bottom) {
        setOverIdx(i);
        break;
      }
    }
  };
  const onTouchEnd = () => {
    if (touchStartIdx.current != null && overIdx != null) moveItem(touchStartIdx.current, overIdx);
    setDragIdx(null); setOverIdx(null);
    touchStartIdx.current = null; touchStartY.current = null;
  };

  // Simple up/down fallback
  const moveUp = (idx) => { if (idx > 0) moveItem(idx, idx - 1); };
  const moveDown = (idx) => { if (idx < ranked.length - 1) moveItem(idx, idx + 1); };

  return (
    <div style={{ textAlign: "center", padding: "20px 16px" }}>
      <div style={{ fontSize: 36, marginBottom: 8 }}>🏆</div>
      <h2 style={{ fontSize: 22, fontWeight: 800, color: "#2E2D8E", marginBottom: 8 }}>Dein Ranking</h2>
      <p style={{ color: "#6b7280", fontSize: 13, marginBottom: 20, lineHeight: 1.6, maxWidth: 320, margin: "0 auto 20px" }}>
        Sortiere deine 8 Werte — welcher ist dir am wichtigsten? Schiebe ihn nach oben. Du kannst die Werte ziehen oder mit den Pfeilen verschieben.
      </p>

      <div ref={listRef} style={{ maxWidth: 360, margin: "0 auto 24px", touchAction: "none" }}
        onTouchMove={onTouchMove} onTouchEnd={onTouchEnd}
      >
        {ranked.map(function(v, idx) {
          var c = CAT[v.cat];
          var isTop = idx === 0;
          var isDragging = dragIdx === idx;
          var isOver = overIdx === idx && dragIdx !== idx;
          return (
            <div key={v.name}
              draggable
              onDragStart={function(e) { onDragStart(e, idx); }}
              onDragOver={function(e) { onDragOver(e, idx); }}
              onDragEnd={onDragEnd}
              onTouchStart={function(e) { onTouchStart(e, idx); }}
              style={{
                display: "flex", alignItems: "center", gap: 8, marginBottom: 4,
                padding: "2px 0",
                opacity: isDragging ? 0.4 : 1,
                borderTop: isOver ? "3px solid #2E2D8E" : "3px solid transparent",
                transition: "border 0.1s ease",
                cursor: "grab",
              }}
            >
              <div style={{
                width: 26, height: 26, borderRadius: 99, flexShrink: 0,
                display: "flex", alignItems: "center", justifyContent: "center",
                fontSize: 12, fontWeight: 800,
                background: isTop ? "#2E2D8E" : idx < 4 ? c.bg + "20" : "#f3f4f6",
                color: isTop ? "#fff" : idx < 4 ? c.bg : "#aaa",
              }}>
                {idx + 1}
              </div>
              <div style={{
                flex: 1, padding: "11px 14px", borderRadius: 12,
                background: isTop
                  ? "linear-gradient(140deg," + c.bg + "ee," + c.bg + ")"
                  : idx < 4 ? c.bg + "15" : "#f8f8f8",
                color: isTop ? "#fff" : c.bg,
                fontSize: 15, fontWeight: 700, textAlign: "left",
                border: isTop ? "2px solid " + c.bg : "2px solid transparent",
                transition: "all 0.15s ease",
                userSelect: "none",
              }}>
                <span style={{ marginRight: 8, opacity: 0.4, fontSize: 12 }}>☰</span>
                {v.name}
              </div>
              <div style={{ display: "flex", flexDirection: "column", gap: 1, flexShrink: 0 }}>
                <button onClick={function() { moveUp(idx); }} disabled={idx === 0} style={{
                  width: 26, height: 22, borderRadius: 5, border: "none",
                  background: idx === 0 ? "#f3f4f6" : "#e0e7ff", color: idx === 0 ? "#ccc" : "#2E2D8E",
                  cursor: idx === 0 ? "default" : "pointer", fontSize: 11, fontWeight: 800,
                  display: "flex", alignItems: "center", justifyContent: "center",
                }}>▲</button>
                <button onClick={function() { moveDown(idx); }} disabled={idx >= ranked.length - 1} style={{
                  width: 26, height: 22, borderRadius: 5, border: "none",
                  background: idx >= ranked.length - 1 ? "#f3f4f6" : "#e0e7ff", color: idx >= ranked.length - 1 ? "#ccc" : "#2E2D8E",
                  cursor: idx >= ranked.length - 1 ? "default" : "pointer", fontSize: 11, fontWeight: 800,
                  display: "flex", alignItems: "center", justifyContent: "center",
                }}>▼</button>
              </div>
            </div>

function KompassBuild({ values8, onDone }) {
  const [step, setStep] = useState("leben");
  const [lw, setLw] = useState(null);
  const [sk, setSk] = useState([]);

  if (step === "leben") return (
    <div style={{ textAlign: "center", padding: "20px 16px" }}>
      <div style={{ fontSize: 36, marginBottom: 8 }}>⭐</div>
      <h2 style={{ fontSize: 22, fontWeight: 800, color: "#1e1b4b", marginBottom: 4 }}>Dein Lebenswert</h2>
      <p style={{ color: "#6b7280", fontSize: 14, marginBottom: 24, lineHeight: 1.5 }}>Welcher Wert steht für dein ganzes Leben?<br />Der, der bei jeder Herausforderung auftaucht.</p>
      <div style={{ display: "flex", flexWrap: "wrap", gap: 10, justifyContent: "center" }}>
        {values8.map(v => <VCard key={v.name} value={v} size="small" onClick={() => { setLw(v); setStep("super"); }} />)}
      </div>
    </div>
  );

  const rest = values8.filter(v => v.name !== lw.name);
  const toggleS = v => {
    if (sk.find(s => s.name === v.name)) setSk(sk.filter(s => s.name !== v.name));
    else if (sk.length < 3) setSk([...sk, v]);

  return (
    <div style={{ textAlign: "center", padding: "20px 16px" }}>
      <div style={{ fontSize: 36, marginBottom: 8 }}>💪</div>
      <h2 style={{ fontSize: 22, fontWeight: 800, color: "#1e1b4b", marginBottom: 4 }}>Deine Superkräfte</h2>

  );

/* roundRect polyfill for older browsers */
function rRect(ctx, x, y, w, h, r) {
  if (typeof r === "number") r = { tl: r, tr: r, br: r, bl: r };
  ctx.beginPath();
  ctx.moveTo(x + r.tl, y);
  ctx.lineTo(x + w - r.tr, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r.tr);
  ctx.lineTo(x + w, y + h - r.br);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r.br, y + h);
  ctx.lineTo(x + r.bl, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r.bl);
  ctx.lineTo(x, y + r.tl);
  ctx.quadraticCurveTo(x, y, x + r.tl, y);
  ctx.closePath();
}

function generateShareImage(kompass, dominant, allValues, valHistory, maxRound) {
  const W = 1080, H = 1080;
  const canvas = document.createElement("canvas");
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext("2d");

  const grad = ctx.createLinearGradient(0, 0, W, H);
  grad.addColorStop(0, "#1e1b4b"); grad.addColorStop(1, "#312e81");
  ctx.fillStyle = grad; ctx.fillRect(0, 0, W, H);

  ctx.beginPath(); ctx.arc(W * 0.85, H * 0.15, 200, 0, Math.PI * 2);
  ctx.fillStyle = CAT[dominant].bg + "22"; ctx.fill();
  ctx.beginPath(); ctx.arc(W * 0.15, H * 0.85, 160, 0, Math.PI * 2);
  ctx.fillStyle = CAT[dominant].bg + "18"; ctx.fill();

  ctx.fillStyle = "#ffffff80"; ctx.font = "600 18px system-ui"; ctx.textAlign = "center";
  ctx.fillText("MEIN WERTEKOMPASS", W / 2, 80);

  ctx.fillStyle = "#fff"; ctx.font = "900 56px system-ui";
  ctx.fillText(kompass.lebenswert.name, W / 2, 170);

  ctx.fillStyle = CAT[kompass.lebenswert.cat].bg;
  rRect(ctx, W / 2 - 80, 185, 160, 30, 15); ctx.fill();
  ctx.fillStyle = "#fff"; ctx.font = "700 12px system-ui";
  ctx.fillText("LEBENSWERT", W / 2, 205);

  ctx.fillStyle = "#ffffff60"; ctx.font = "600 14px system-ui";
  ctx.fillText("SUPERKRÄFTE", W / 2, 270);
  ctx.fillStyle = "#fff"; ctx.font = "700 32px system-ui";
  const skText = kompass.superkraefte.map(v => v.name).join("  ·  ");
  ctx.fillText(skText.length > 40 ? skText.substring(0, 37) + "…" : skText, W / 2, 310);

  ctx.fillStyle = "#ffffff60"; ctx.font = "600 14px system-ui";
  ctx.fillText("GRUNDWERTE", W / 2, 380);
  ctx.fillStyle = "#ffffffcc"; ctx.font = "600 24px system-ui";
  const gwText = kompass.grundwerte.map(v => v.name).join("  ·  ");
  ctx.fillText(gwText.length > 50 ? gwText.substring(0, 47) + "…" : gwText, W / 2, 418);

  const desc = TYPE_DESC[dominant];
  const cardY = 470, cardW = W - 120, cardX = 60;
  ctx.fillStyle = "#ffffff12";
  rRect(ctx, cardX, cardY, cardW, 280, 20); ctx.fill();
  ctx.strokeStyle = CAT[dominant].bg + "44"; ctx.lineWidth = 2;
  rRect(ctx, cardX, cardY, cardW, 280, 20); ctx.stroke();

  ctx.fillStyle = CAT[dominant].bg; ctx.font = "800 20px system-ui";
  ctx.fillText(`${desc.emoji}  ${desc.title}`, W / 2, cardY + 40);
  ctx.fillStyle = "#ffffffcc"; ctx.font = "600 18px system-ui";
  ctx.fillText(desc.short, W / 2, cardY + 72);

  ctx.fillStyle = "#ffffff99"; ctx.font = "400 16px system-ui";
  const words = desc.text.split(" ");
  let line = "", lineY = cardY + 110;
  for (const word of words) {
    const test = line + word + " ";
    if (ctx.measureText(test).width > cardW - 60) {
      ctx.fillText(line.trim(), W / 2, lineY); line = word + " "; lineY += 24;
    } else line = test;
  }
  if (line.trim()) ctx.fillText(line.trim(), W / 2, lineY);

  // DNA STRIP VISUALIZATION
  const dnaY = 790, dnaH = 150;
  const final8 = new Set(allValues.map(v => v.name));
  const lanes = [
    { cat: "orange", vals: ALL_VALUES_BY_CAT.orange, color: "#F97316", bright: "#FFAA44", label: "Sicherheit" },
    { cat: "pink", vals: ALL_VALUES_BY_CAT.pink, color: "#EC4899", bright: "#F472B6", label: "Verbindung" },
    { cat: "blue", vals: ALL_VALUES_BY_CAT.blue, color: "#3B82F6", bright: "#60A5FA", label: "Veränderung" },
    { cat: "green", vals: ALL_VALUES_BY_CAT.green, color: "#22C55E", bright: "#4ADE80", label: "Selbstfindung" },
  ];
  const allValsFlat = lanes.flatMap(l => l.vals.map(n => ({ name: n, ...l })));
  const totalBands = allValsFlat.length;

  ctx.fillStyle = "#06061a";
  rRect(ctx, 60, dnaY - 10, W - 120, dnaH + 50, 16); ctx.fill();
  ctx.fillStyle = "#4338ca66"; ctx.font = "700 11px system-ui"; ctx.textAlign = "center";
  ctx.fillText("V - C O D E   D N A", W / 2, dnaY + 6);

  // Zone labels
  const stripPad = 80, stripW = W - stripPad * 2;
  let lx = stripPad;
  lanes.forEach(lane => {
    const zw = (lane.vals.length / totalBands) * stripW;
    ctx.fillStyle = lane.color + "66"; ctx.font = "700 9px system-ui";
    ctx.fillText(lane.label.toUpperCase(), lx + zw / 2, dnaY + 20);
    lx += zw;
  });

  // Draw bands
  const bandAreaY = dnaY + 26, bandAreaH = dnaH - 30;
  let bx = stripPad;
  allValsFlat.forEach(val => {
    const bandW = stripW / totalBands;
    const cx = bx + bandW / 2;
    const rs = (valHistory && valHistory[val.name]) || 0;
    const isF8 = final8.has(val.name);
    const mr = maxRound || 3;

    let intensity = isF8 ? 1.0 : rs >= mr ? 0.7 : rs >= mr - 1 && mr > 1 ? 0.4 : rs >= 1 ? 0.18 : 0.04;
    const bh = bandAreaH * (isF8 ? 0.85 : 0.3 + intensity * 0.5);
    const by = bandAreaY + (bandAreaH - bh) / 2;
    const bw = Math.max(3, bandW * 0.6);

    if (isF8) {
      ctx.shadowColor = val.bright; ctx.shadowBlur = 16;
      ctx.fillStyle = val.bright;
      ctx.fillRect(cx - bw / 2, by, bw, bh);
      ctx.shadowBlur = 0;
      ctx.fillStyle = "#ffffffaa";
      ctx.fillRect(cx - bw * 0.2, by + 3, bw * 0.4, bh - 6);
    } else if (intensity > 0.05) {
      ctx.fillStyle = val.color + Math.round(intensity * 180).toString(16).padStart(2, "0");
      ctx.fillRect(cx - bw / 2, by, bw, bh);
    } else {
      ctx.fillStyle = "#ffffff06";
      ctx.fillRect(cx - 1.5, by, 3, bh);
    }
    bx += bandW;
  });

  // Gradient line
  const gradLine = ctx.createLinearGradient(stripPad, 0, W - stripPad, 0);
  gradLine.addColorStop(0, "#F97316"); gradLine.addColorStop(0.3, "#EC4899");
  gradLine.addColorStop(0.65, "#3B82F6"); gradLine.addColorStop(1, "#22C55E");
  ctx.fillStyle = gradLine;
  ctx.fillRect(stripPad, bandAreaY + bandAreaH + 4, stripW, 3);

  // V-Code abbreviation string (colored)
  ctx.font = "800 22px monospace"; ctx.textAlign = "center";
  const abbrParts = allValues.map(v => ({ abbr: VALUE_ABBR[v.name] || "?", cat: v.cat }));
  const abbrStr = abbrParts.map(p => p.abbr).join(" · ");
  const totalAbbrW = ctx.measureText(abbrStr).width;
  let ax = (W - totalAbbrW) / 2;
  const ay = 975;
  ctx.textAlign = "left";
  abbrParts.forEach((p, i) => {
    const catCol = p.cat === "orange" ? "#FFAA44" : p.cat === "pink" ? "#F472B6" : p.cat === "blue" ? "#60A5FA" : "#4ADE80";
    ctx.fillStyle = catCol;
    ctx.fillText(p.abbr, ax, ay);
    ax += ctx.measureText(p.abbr).width;
    if (i < abbrParts.length - 1) {
      ctx.fillStyle = "#ffffff33";
      ctx.fillText(" · ", ax, ay);
      ax += ctx.measureText(" · ").width;
    }
  });

  ctx.textAlign = "center";
  ctx.fillStyle = "#ffffff50"; ctx.font = "700 16px system-ui";
  ctx.fillText("valueverse.de", W / 2, 1020);
  ctx.fillStyle = "#ffffff30"; ctx.font = "400 13px system-ui";
  ctx.fillText("Finde deinen V-Code — das wahrscheinlich wertvollste Spiel der Welt", W / 2, 1045);

  return canvas.toDataURL("image/png");
}

/* ═══════════════════════════════════════════
   V-CODE DNA VISUALIZATION
   ═══════════════════════════════════════════ */

function VCodeDNA({ allValues, valHistory, maxRound }) {
  const final8 = new Set(allValues.map(v => v.name));
  const canvasRef = useRef(null);

  const catColors = {
    orange: { main: "#F97316", bright: "#FFAA44", glow: "rgba(249,115,22,", label: "Sicherheit" },
    pink:   { main: "#EC4899", bright: "#F472B6", glow: "rgba(236,72,153,", label: "Verbindung" },
    blue:   { main: "#3B82F6", bright: "#60A5FA", glow: "rgba(59,130,246,", label: "Veränderung" },
    green:  { main: "#22C55E", bright: "#4ADE80", glow: "rgba(34,197,94,",  label: "Selbstfindung" },
  };

  const catOrder = ["orange", "pink", "blue", "green"];
  const allVals = catOrder.flatMap(cat => ALL_VALUES_BY_CAT[cat].map(name => ({ name, cat })));
  const totalVals = allVals.length;

  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const dpr = window.devicePixelRatio || 1;
    const dispW = canvas.parentElement.clientWidth;
    const dispH = 220;
    canvas.width = dispW * dpr;
    canvas.height = dispH * dpr;
    canvas.style.width = dispW + "px";
    canvas.style.height = dispH + "px";
    const ctx = canvas.getContext("2d");
    ctx.scale(dpr, dpr);
    const W = dispW, H = dispH;

    // Background
    const bg = ctx.createLinearGradient(0, 0, 0, H);
    bg.addColorStop(0, "#06061a"); bg.addColorStop(0.5, "#0a0d20"); bg.addColorStop(1, "#06061a");
    ctx.fillStyle = bg; ctx.fillRect(0, 0, W, H);

    // Scan lines
    ctx.globalAlpha = 0.03;
    for (let y = 0; y < H; y += 3) {
      ctx.fillStyle = "#fff";
      ctx.fillRect(0, y, W, 1);
    }
    ctx.globalAlpha = 1;

    const pad = 12;
    const stripY = 50, stripH = 120;
    const bandArea = W - pad * 2;

    // Color zone backgrounds
    let zoneX = pad;
    catOrder.forEach((cat, ci) => {
      const count = ALL_VALUES_BY_CAT[cat].length;
      const zoneW = (count / totalVals) * bandArea;
      const col = catColors[cat];

      // Zone bg gradient
      const zg = ctx.createLinearGradient(zoneX, stripY, zoneX, stripY + stripH);
      zg.addColorStop(0, col.glow + "0.03)"); zg.addColorStop(0.5, col.glow + "0.06)"); zg.addColorStop(1, col.glow + "0.03)");
      ctx.fillStyle = zg;
      ctx.fillRect(zoneX, stripY, zoneW, stripH);

      // Zone border
      if (ci > 0) {
        ctx.strokeStyle = "rgba(255,255,255,0.06)";
        ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(zoneX, stripY); ctx.lineTo(zoneX, stripY + stripH); ctx.stroke();
      }

      // Zone label
      ctx.fillStyle = col.main + "88";
      ctx.font = "700 8px system-ui";
      ctx.textAlign = "center";
      ctx.fillText(col.label.toUpperCase(), zoneX + zoneW / 2, stripY - 6);

      zoneX += zoneW;
    });

    // Draw bands
    let x = pad;
    allVals.forEach((val, vi) => {
      const col = catColors[val.cat];
      const zoneCount = ALL_VALUES_BY_CAT[val.cat].length;
      const bandW = (1 / totalVals) * bandArea;
      const cx = x + bandW / 2;

      const roundSurvived = valHistory[val.name] || 0;
      const isFinal = final8.has(val.name);

      // Calculate intensity: 0 = never won, maxRound = last compare round, 99 = final8
      let intensity = 0;
      if (isFinal) {
        intensity = 1.0;
      } else if (roundSurvived >= maxRound) {
        intensity = 0.7;
      } else if (roundSurvived >= maxRound - 1 && maxRound > 1) {
        intensity = 0.4;
      } else if (roundSurvived >= 1) {
        intensity = 0.18;
      } else {
        intensity = 0.04;
      }

      const bandH = isFinal ? stripH * 0.85 : stripH * (0.3 + intensity * 0.55);
      const bandY = stripY + (stripH - bandH) / 2;
      const bw = Math.max(2, bandW * 0.55);

      if (isFinal) {
        // Outer glow
        ctx.shadowColor = col.bright;
        ctx.shadowBlur = 14;
        ctx.fillStyle = col.bright;
        ctx.fillRect(cx - bw / 2, bandY, bw, bandH);
        ctx.shadowBlur = 8;
        ctx.fillRect(cx - bw / 2, bandY, bw, bandH);
        ctx.shadowBlur = 0;

        // Inner bright core
        const innerW = bw * 0.5;
        ctx.fillStyle = "#ffffffcc";
        ctx.fillRect(cx - innerW / 2, bandY + 2, innerW, bandH - 4);

        // Abbreviation label below strip
        ctx.save();
        ctx.translate(cx, stripY + stripH + 10);
        ctx.rotate(-Math.PI / 4);
        ctx.fillStyle = col.bright;
        ctx.font = "bold 8px system-ui";
        ctx.textAlign = "left";
        ctx.fillText(VALUE_ABBR[val.name] || val.name.slice(0,3), 0, 0);
        ctx.restore();
      } else if (intensity > 0.05) {
        // Faint to medium band
        ctx.fillStyle = col.glow + (intensity * 0.8).toFixed(2) + ")";
        ctx.fillRect(cx - bw / 2, bandY, bw, bandH);

        // Slightly brighter center
        if (intensity > 0.3) {
          const coreW = bw * 0.4;
          ctx.fillStyle = col.glow + (intensity * 0.5).toFixed(2) + ")";
          ctx.fillRect(cx - coreW / 2, bandY + bandH * 0.2, coreW, bandH * 0.6);

          // Faint abbreviation for medium-intensity
          ctx.save();
          ctx.translate(cx, stripY + stripH + 8);
          ctx.rotate(-Math.PI / 4);
          ctx.fillStyle = col.glow + "0.35)";
          ctx.font = "600 6px system-ui";
          ctx.textAlign = "left";
          ctx.fillText(VALUE_ABBR[val.name] || val.name.slice(0,3), 0, 0);
          ctx.restore();
        }
      } else {
        // Ghost band
        ctx.fillStyle = "rgba(255,255,255,0.015)";
        ctx.fillRect(cx - 1, bandY, 2, bandH);
      }

      x += bandW;
    });

    // Gradient line at bottom of strip
    const gradLine = ctx.createLinearGradient(pad, 0, W - pad, 0);
    gradLine.addColorStop(0, "#F97316"); gradLine.addColorStop(0.3, "#EC4899");
    gradLine.addColorStop(0.65, "#3B82F6"); gradLine.addColorStop(1, "#22C55E");
    ctx.fillStyle = gradLine;
    rRect(ctx, pad, stripY + stripH + 2, bandArea, 2, 1);
    ctx.fill();

    // Header
    ctx.fillStyle = "#4338ca88";
    ctx.font = "700 9px system-ui";
    ctx.textAlign = "center";
    ctx.fillText("V - C O D E   D N A", W / 2, 18);

    // Speakable V-Code abbreviation string
    ctx.font = "700 10px monospace";
    const abbrCode = allValues.map(v => VALUE_ABBR[v.name] || "?").join("·");
    // Color each abbreviation
    const fullStr = abbrCode;
    const totalW = ctx.measureText(fullStr).width;
    let tx = (W - totalW) / 2;
    const ty = H - 8;
    allValues.forEach((v, i) => {
      const abbr = VALUE_ABBR[v.name] || "?";
      const sep = i < allValues.length - 1 ? "·" : "";
      ctx.fillStyle = catColors[v.cat].bright + "cc";
      ctx.textAlign = "left";
      ctx.fillText(abbr, tx, ty);
      tx += ctx.measureText(abbr).width;
      if (sep) {
        ctx.fillStyle = "#ffffff33";
        ctx.fillText(sep, tx, ty);
        tx += ctx.measureText(sep).width;
      }
    });

  }, [allValues, valHistory, maxRound]);

  return (
    <div style={{
      borderRadius: 16, overflow: "hidden", marginBottom: 24,
      border: "1px solid rgba(99,102,241,0.15)",
      background: "#06061a",
    }}>
      <canvas ref={canvasRef} style={{ display: "block", width: "100%" }} />
    </div>
  );
}

function Result({ kompass, onRestart, valHistory, maxRound, demographics, saveError, typeDescs }) {
  const { lebenswert: lw, superkraefte: sk, grundwerte: gw } = kompass;
  const all = [lw, ...sk, ...gw];
  const cc = {}; all.forEach(v => { cc[v.cat] = (cc[v.cat] || 0) + 1; });
  const dominant = Object.entries(cc).sort((a, b) => b[1] - a[1])[0][0];
  const td = typeDescs || TYPE_DESC;
  const desc = td[dominant];
  const [shareImg, setShareImg] = useState(null);
  const [copied, setCopied] = useState(false);
  const [showDeep, setShowDeep] = useState(false);
  const [deepPin, setDeepPin] = useState("");
  const [deepError, setDeepError] = useState(false);
  const DEEP_PIN = "TIEFER";

  const handleShare = () => {
    try { setShareImg(generateShareImage(kompass, dominant, all, valHistory, maxRound)); }
    catch(e) { console.error("Share image error:", e); }
  };
  const handleDownload = () => {
    try {
      if (!shareImg) return;
      const a = document.createElement("a"); a.href = shareImg; a.download = "mein-wertekompass.png"; a.click();
    } catch(e) {}
  };
  const handleCopy = () => {
    const text = "🧭 Mein Wertekompass\n\n" + all.map(function(v, i) { return "#" + (i+1) + " " + v.name; }).join("\n") + "\n\n" + desc.emoji + " Ich bin \"" + desc.title + "\"\n\nFinde deinen Wertekompass: valueverse.de";
    try { navigator.clipboard.writeText(text).then(() => { setCopied(true); setTimeout(() => setCopied(false), 2000); }); }
    catch(e) { prompt("Text kopieren:", text); }
  };

  const tryDeepPin = () => {
    if (deepPin.toUpperCase() === DEEP_PIN) { setShowDeep(true); setDeepError(false); }
    else { setDeepError(true); setDeepPin(""); }
  };

  return (
    <div style={{ textAlign: "center", padding: "24px 16px" }}>
      {saveError && (
        <div style={{ background: "#fef2f2", border: "1px solid #fca5a5", borderRadius: 12, padding: "10px 14px", marginBottom: 16, fontSize: 11, color: "#b91c1c" }}>

      )}

      <div style={{ fontSize: 52, marginBottom: 8 }}>🧭</div>
      <h1 style={{ fontSize: 28, fontWeight: 900, color: "#2E2D8E", letterSpacing: "-0.04em", margin: "0 0 4px" }}>Dein Wertekompass</h1>
      <p style={{ color: "#6b7280", fontSize: 14, marginBottom: 28 }}>Das sind deine persönlichen Top-Werte — sortiert nach Wichtigkeit.</p>

        {all.map(function(v, idx) {

          var barWidth = 100 - (idx * 8);
          return (
            <div key={v.name} style={{
              display: "flex", alignItems: "center", gap: 10, marginBottom: 6,

              <div style={{
                width: 30, fontSize: idx === 0 ? 20 : 14, fontWeight: 800,
                color: idx === 0 ? "#2E2D8E" : idx < 3 ? c.bg : "#b0b0b0",
                textAlign: "right", flexShrink: 0,
              }}>
                {idx === 0 ? "🥇" : idx === 1 ? "🥈" : idx === 2 ? "🥉" : "#" + (idx + 1)}
              </div>
              <div style={{
                flex: 1, padding: isTop3 ? "13px 16px" : "10px 14px",
                borderRadius: 12,
                background: idx === 0
                  ? "linear-gradient(135deg," + c.bg + "ee," + c.bg + ")"
                  : isTop3 ? c.bg + "18" : "#f5f5f5",
                color: idx === 0 ? "#fff" : c.bg,
                fontSize: isTop3 ? 17 : 15, fontWeight: isTop3 ? 800 : 600,
                textAlign: "left",
                border: idx === 0 ? "none" : isTop3 ? "2px solid " + c.bg + "30" : "none",
                transition: "all 0.2s ease",
              }}>
                {v.name}
              </div>
            </div>
