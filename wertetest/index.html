      {/* Wertetyp */}
      <div style={{ background: CAT[dominant].bg + "10", border: "2px solid " + CAT[dominant].bg + "25", borderRadius: 18, padding: "20px 22px", marginBottom: 24, maxWidth: 380, margin: "0 auto 24px" }}>
        <div style={{ fontSize: 36, marginBottom: 4 }}>{desc.emoji}</div>
        <div style={{ fontSize: 20, fontWeight: 800, color: "#2E2D8E" }}>{desc.title}</div>
        <div style={{ fontSize: 14, fontWeight: 600, color: CAT[dominant].bg, marginTop: 4, marginBottom: 12 }}>{desc.short}</div>
        <p style={{ fontSize: 13, color: "#4b5563", lineHeight: 1.7, margin: 0, textAlign: "left" }}>{desc.text}</p>
      </div>

      {/* V-Code */}
      <div style={{ background: "#1e1b4b", borderRadius: 14, padding: "16px 20px", marginBottom: 24, maxWidth: 380, margin: "0 auto 24px" }}>
        <div style={{ fontSize: 10, color: "#6366f1", marginBottom: 6, textTransform: "uppercase", letterSpacing: 3 }}>Dein V‑Code</div>
        <div style={{ display: "flex", justifyContent: "center", gap: 3, flexWrap: "wrap" }}>
          {all.map(function(v, i) {
            return (
              <span key={v.name} style={{ fontFamily: "monospace", fontSize: 14, fontWeight: 800, color: CAT[v.cat].bg }}>
                {VALUE_ABBR[v.name] || "?"}{i < all.length - 1 ? <span style={{ color: "#ffffff22", margin: "0 1px" }}>·</span> : ""}
              </span>
            );
          })}
        </div>
      </div>

      {/* Share */}
      <div style={{ display: "flex", gap: 10, justifyContent: "center", flexWrap: "wrap", marginBottom: 24 }}>
        <button onClick={handleShare} style={{
          background: "linear-gradient(135deg,#E4405F,#C13584)", color: "#fff", border: "none", borderRadius: 12,
          padding: "12px 20px", fontSize: 14, fontWeight: 700, cursor: "pointer",
        }}>📸 Bild erstellen</button>
        <button onClick={handleCopy} style={{
          background: "linear-gradient(135deg,#0077B5,#00A0DC)", color: "#fff", border: "none", borderRadius: 12,
          padding: "12px 20px", fontSize: 14, fontWeight: 700, cursor: "pointer",
        }}>{copied ? "✅ Kopiert!" : "📋 Text kopieren"}</button>
      </div>
      {shareImg && (
        <div style={{ marginBottom: 24, maxWidth: 380, margin: "0 auto 24px" }}>
          <img src={shareImg} alt="Wertekompass" style={{ width: "100%", borderRadius: 12, border: "1px solid #e5e7eb" }} />
          <button onClick={handleDownload} style={{
            background: "#1e1b4b", color: "#fff", border: "none", borderRadius: 99,
            padding: "10px 24px", fontSize: 13, fontWeight: 700, cursor: "pointer", marginTop: 12,
          }}>⬇️ Bild speichern</button>
        </div>
      )}

      {/* Deep dive section - PIN locked */}
      {!showDeep && (
        <div style={{ background: "#f8fafc", borderRadius: 16, padding: 20, marginBottom: 24, maxWidth: 380, margin: "0 auto 24px" }}>
          <div style={{ fontSize: 28, marginBottom: 8 }}>🔍</div>
          <div style={{ fontSize: 16, fontWeight: 800, color: "#2E2D8E", marginBottom: 4 }}>Tiefer gehen?</div>
          <p style={{ fontSize: 12, color: "#9ca3af", marginBottom: 14, lineHeight: 1.5 }}>
            Finde heraus was dein Lebenswert und deine Superkräfte sind. Deine Lehrkraft gibt dir den Code dafür.
          </p>
          <div style={{ display: "flex", gap: 8, justifyContent: "center", alignItems: "center" }}>
            <input type="text" value={deepPin} onChange={function(e) { setDeepPin(e.target.value); setDeepError(false); }}
              onKeyDown={function(e) { if (e.key === "Enter") tryDeepPin(); }}
              placeholder="Code eingeben"
              style={{
                padding: "10px 16px", fontSize: 15, fontWeight: 600, borderRadius: 10,
                border: deepError ? "2px solid #ef4444" : "2px solid #e5e7eb",
                outline: "none", width: 140, textAlign: "center", textTransform: "uppercase",
              }}
            />
            <Btn small primary onClick={tryDeepPin}>Freischalten</Btn>
          </div>
          {deepError && <p style={{ color: "#ef4444", fontSize: 12, marginTop: 6 }}>Falscher Code</p>}
        </div>
      )}

      {/* Deep dive content - unlocked */}
      {showDeep && (
        <div style={{ maxWidth: 380, margin: "0 auto 24px" }}>
          <div style={{ background: "#f0fdf4", border: "1px solid #bbf7d0", borderRadius: 12, padding: "10px 16px", marginBottom: 20, fontSize: 13, color: "#166534", fontWeight: 600 }}>
            ✅ Detailansicht freigeschaltet
          </div>

          <div style={{ background: "linear-gradient(140deg,#1e1b4b,#312e81)", borderRadius: 20, padding: 24, marginBottom: 16, color: "#fff" }}>
            <div style={{ fontSize: 11, textTransform: "uppercase", letterSpacing: 3, opacity: 0.6, marginBottom: 8 }}>Lebenswert</div>
            <div style={{ fontSize: 32, fontWeight: 900 }}>{lw.name}</div>
            <div style={{ display: "inline-block", marginTop: 8, background: CAT[lw.cat].bg, padding: "4px 14px", borderRadius: 99, fontSize: 11, fontWeight: 600 }}>{CAT[lw.cat].label}</div>
          </div>

          <div style={{ marginBottom: 16 }}>
            <div style={{ fontSize: 11, textTransform: "uppercase", letterSpacing: 3, color: "#9ca3af", marginBottom: 8 }}>Superkräfte</div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 6 }}>
              {sk.map(function(v) {
                var c = CAT[v.cat];
                return (
                  <div key={v.name} style={{ padding: "10px 6px", borderRadius: 12, background: "linear-gradient(140deg," + c.bg + "ee," + c.bg + ")", color: "#fff", fontSize: 13, fontWeight: 700, textAlign: "center" }}>
                    💪 {v.name}
                  </div>
                );
              })}
            </div>
          </div>

          <div style={{ marginBottom: 20 }}>
            <div style={{ fontSize: 11, textTransform: "uppercase", letterSpacing: 3, color: "#9ca3af", marginBottom: 8 }}>Grundwerte</div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 6 }}>
              {gw.map(function(v) {
                var c = CAT[v.cat];
                return (
                  <div key={v.name} style={{ padding: "8px 6px", borderRadius: 10, background: c.bg + "15", color: c.bg, fontSize: 13, fontWeight: 600, textAlign: "center" }}>
                    {v.name}
                  </div>
                );
              })}
            </div>
          </div>

          {/* DNA Viz */}
          <VCodeDNA allValues={all} valHistory={valHistory} maxRound={maxRound} />
        </div>
      )}

      <div style={{ marginTop: 8 }}>
        <Btn onClick={onRestart}>🔄 Nochmal spielen</Btn>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════
   ADMIN DASHBOARD
   ═══════════════════════════════════════════ */

function AdminDashboard({ onBack }) {
  const [tab, setTab] = useState("overview");
  const [results, setResults] = useState([]);
  const [loading, setLoading] = useState(true);
  const [expandedId, setExpandedId] = useState(null);
  const [filterKlasse, setFilterKlasse] = useState("all");
  const [filterGeschlecht, setFilterGeschlecht] = useState("all");
  const [connStatus, setConnStatus] = useState("checking"); // "checking" | "ok" | "error"
  const [connError, setConnError] = useState(null);

  // Normalize Supabase rows to match local format
  const normalize = (rows) => rows.map(r => {
    if (r.demographics) return r; // already local format
    return {
      id: r.id,
      ts: r.created_at,
      demographics: { geschlecht: r.geschlecht, klasse: r.klassenstufe, schulform: r.schulform },
      lebenswert: { name: r.lebenswert, cat: r.lebenswert_cat },
      superkraefte: r.superkraefte || [],
      grundwerte: r.grundwerte || [],
      allValues: r.all_values || [],
      dominant: r.dominant,
      vcode: r.vcode,
    };
  });

  const loadResults = async () => {
    setLoading(true);
    try {
      if (USE_SUPABASE) {
        setConnStatus("checking");
        const resp = await fetch(`${SUPABASE_URL}/rest/v1/results?select=*&order=created_at.desc`, {
          headers: { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}` },
        });
        if (!resp.ok) {
          const errText = await resp.text().catch(() => "");
          setConnStatus("error");
          setConnError(`HTTP ${resp.status}: ${errText.slice(0, 200)}`);
          setResults([]);
        } else {
          const rows = await resp.json();
          setConnStatus("ok");
          setConnError(null);
          setResults(normalize(rows));
        }
      } else {
        const stored = await window.storage.get(RESULTS_KEY);
        if (stored?.value) setResults(JSON.parse(stored.value));
        else setResults([]);
        setConnStatus("ok");
      }
    } catch(e) {
      setConnStatus("error");
      setConnError(e.message || "Verbindung fehlgeschlagen");
      setResults([]);
    }
    setLoading(false);
  };

  useEffect(() => { loadResults(); }, []);

  const deleteResult = async (id) => {
    const updated = results.filter(r => r.id !== id);
    setResults(updated);
    if (USE_SUPABASE) { await supa.remove("results", id); }
    else { try { await window.storage.set(RESULTS_KEY, JSON.stringify(updated)); } catch(e) {} }
  };

  const clearAll = async () => {
    if (!confirm("Alle Ergebnisse löschen? Das kann nicht rückgängig gemacht werden.")) return;
    setResults([]);
    if (USE_SUPABASE) { await supa.removeAll("results"); }
    else { try { await window.storage.set(RESULTS_KEY, JSON.stringify([])); } catch(e) {} }
  };

  const exportCSV = () => {
    const headers = ["Datum","Geschlecht","Klasse","Schulform","Lebenswert","Superkräfte","Grundwerte","V-Code","Dominanter Typ"];
    const rows = filtered.map(r => [
      new Date(r.ts).toLocaleDateString("de-DE"),
      r.demographics?.geschlecht || "",
      r.demographics?.klasse || "",
      r.demographics?.schulform || "",
      r.lebenswert?.name || "",
      (r.superkraefte||[]).map(v=>v.name).join("; "),
      (r.grundwerte||[]).map(v=>v.name).join("; "),
      r.vcode || "",
      r.dominant || "",
    ]);
    const csv = [headers, ...rows].map(r => r.map(c => `"${c}"`).join(",")).join("\n");
    const blob = new Blob(["\uFEFF" + csv], { type: "text/csv;charset=utf-8;" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = `valueverse-ergebnisse-${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
  };

  // Filters
  const filtered = results.filter(r => {
    if (filterKlasse !== "all" && r.demographics?.klasse !== filterKlasse) return false;
    if (filterGeschlecht !== "all" && r.demographics?.geschlecht !== filterGeschlecht) return false;
    return true;
  });

  // Stats
  const klassen = [...new Set(results.map(r => r.demographics?.klasse).filter(Boolean))].sort();
  const valueCounts = {};
  filtered.forEach(r => {
    (r.allValues || []).forEach(v => {
      valueCounts[v.name] = (valueCounts[v.name] || { count: 0, cat: v.cat });
      valueCounts[v.name].count++;
    });
  });
  const typeCounts = { orange: 0, pink: 0, blue: 0, green: 0 };
  filtered.forEach(r => { if (r.dominant) typeCounts[r.dominant]++; });

  const tabStyle = (t) => ({
    flex: 1, padding: "10px 8px", fontSize: 13, fontWeight: 700, cursor: "pointer",
    border: "none", borderBottom: tab === t ? "3px solid #6366f1" : "3px solid transparent",
    background: tab === t ? "#eef2ff" : "#fff", color: tab === t ? "#4338ca" : "#6b7280",
  });

  if (loading) return <div style={{ textAlign: "center", padding: 60, color: "#6b7280" }}>Laden...</div>;

  return (
    <div style={{ padding: "16px 12px", maxWidth: 500, margin: "0 auto" }}>
      {/* Header */}
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
        <div>
          <h2 style={{ fontSize: 20, fontWeight: 800, color: "#1e1b4b", margin: 0 }}>📊 Dashboard</h2>
          <p style={{ fontSize: 12, color: "#6b7280", margin: "4px 0 0" }}>{results.length} Ergebnisse gesamt</p>
        </div>
        <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
          <button onClick={loadResults} style={{ background: "none", border: "none", fontSize: 18, cursor: "pointer", padding: 4 }} title="Aktualisieren">🔄</button>
          <Btn small onClick={onBack}>← Admin</Btn>
        </div>
      </div>
      <div style={{
        display: "inline-flex", alignItems: "center", gap: 6, marginBottom: 16,
        fontSize: 11, fontWeight: 600, padding: "4px 12px", borderRadius: 99,
        background: connStatus === "ok" ? "#f0fdf4" : connStatus === "error" ? "#fef2f2" : "#f3f4f6",
        color: connStatus === "ok" ? "#166534" : connStatus === "error" ? "#b91c1c" : "#6b7280",
      }}>
        <span style={{ width: 8, height: 8, borderRadius: 99, background: connStatus === "ok" ? "#22c55e" : connStatus === "error" ? "#ef4444" : "#9ca3af" }} />
        {connStatus === "ok" && (USE_SUPABASE ? "Cloud-Datenbank verbunden" : "Lokaler Speicher")}
        {connStatus === "checking" && "Verbindung wird geprüft..."}
        {connStatus === "error" && "Verbindung fehlgeschlagen"}
      </div>
      {connError && (
        <div style={{ background: "#fef2f2", border: "1px solid #fca5a5", borderRadius: 10, padding: "8px 12px", marginBottom: 12, fontSize: 11, color: "#b91c1c", wordBreak: "break-all" }}>
          {connError}
        </div>
      )}

      {/* Tabs */}
      <div style={{ display: "flex", borderBottom: "1px solid #e5e7eb", marginBottom: 16 }}>
        <button style={tabStyle("overview")} onClick={() => setTab("overview")}>Übersicht</button>
        <button style={tabStyle("results")} onClick={() => setTab("results")}>Ergebnisse</button>
        <button style={tabStyle("cloud")} onClick={() => setTab("cloud")}>Tag-Cloud</button>
      </div>

      {/* Filters (shared) */}
      {results.length > 0 && (
        <div style={{ display: "flex", gap: 8, marginBottom: 16, flexWrap: "wrap" }}>
          <select value={filterKlasse} onChange={e => setFilterKlasse(e.target.value)}
            style={{ padding: "6px 10px", borderRadius: 8, border: "1px solid #e5e7eb", fontSize: 13 }}>
            <option value="all">Alle Klassen</option>
            {klassen.map(k => <option key={k} value={k}>Klasse {k}</option>)}
          </select>
          <select value={filterGeschlecht} onChange={e => setFilterGeschlecht(e.target.value)}
            style={{ padding: "6px 10px", borderRadius: 8, border: "1px solid #e5e7eb", fontSize: 13 }}>
            <option value="all">Alle Geschlechter</option>
            <option value="m">männlich</option>
            <option value="w">weiblich</option>
            <option value="d">divers</option>
            <option value="k">keine Angabe</option>
          </select>
          <span style={{ fontSize: 12, color: "#9ca3af", alignSelf: "center" }}>{filtered.length} gefiltert</span>
        </div>
      )}

      {/* ─── OVERVIEW TAB ─── */}
      {tab === "overview" && (
        <div>
          {results.length === 0 ? (
            <div style={{ textAlign: "center", padding: 40, color: "#9ca3af" }}>
              <div style={{ fontSize: 40, marginBottom: 8 }}>📭</div>
              <p>Noch keine Ergebnisse. Sobald Spieler das Spiel abschließen, erscheinen sie hier.</p>
            </div>
          ) : (
            <>
              {/* Type distribution */}
              <div style={{ background: "#f8fafc", borderRadius: 14, padding: 16, marginBottom: 16 }}>
                <div style={{ fontSize: 12, fontWeight: 700, color: "#1e1b4b", marginBottom: 12 }}>Wertetyp-Verteilung</div>
                {Object.entries(typeCounts).filter(([,n]) => n > 0).sort((a,b) => b[1] - a[1]).map(([cat, n]) => (
                  <div key={cat} style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 8 }}>
                    <div style={{ width: 12, height: 12, borderRadius: 4, background: CAT[cat].bg, flexShrink: 0 }} />
                    <div style={{ flex: 1, fontSize: 13, color: "#374151" }}>{TYPE_DESC[cat].title}</div>
                    <div style={{ height: 8, borderRadius: 4, background: CAT[cat].bg, width: `${(n / filtered.length) * 120}px`, minWidth: 8 }} />
                    <span style={{ fontSize: 12, fontWeight: 700, color: "#1e1b4b", minWidth: 30, textAlign: "right" }}>
                      {Math.round((n / filtered.length) * 100)}%
                    </span>
                  </div>
                ))}
              </div>

              {/* Top values */}
              <div style={{ background: "#f8fafc", borderRadius: 14, padding: 16, marginBottom: 16 }}>
                <div style={{ fontSize: 12, fontWeight: 700, color: "#1e1b4b", marginBottom: 12 }}>Top 10 Werte</div>
                {Object.entries(valueCounts).sort((a, b) => b[1].count - a[1].count).slice(0, 10).map(([name, { count, cat }], i) => (
                  <div key={name} style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 6 }}>
                    <span style={{ fontSize: 12, color: "#9ca3af", width: 18, textAlign: "right" }}>{i + 1}.</span>
                    <div style={{ width: 8, height: 8, borderRadius: 2, background: CAT[cat].bg }} />
                    <span style={{ flex: 1, fontSize: 13, fontWeight: 600, color: "#1e1b4b" }}>{name}</span>
                    <div style={{ height: 6, borderRadius: 3, background: CAT[cat].bg, width: `${(count / filtered.length) * 100}px`, minWidth: 4 }} />
                    <span style={{ fontSize: 12, color: "#6b7280", minWidth: 24, textAlign: "right" }}>{count}×</span>
                  </div>
                ))}
              </div>

              {/* Demographics breakdown */}
              <div style={{ background: "#f8fafc", borderRadius: 14, padding: 16, marginBottom: 16 }}>
                <div style={{ fontSize: 12, fontWeight: 700, color: "#1e1b4b", marginBottom: 12 }}>Teilnehmer</div>
                <div style={{ display: "flex", gap: 16, flexWrap: "wrap" }}>
                  <div>
                    <span style={{ fontSize: 28, fontWeight: 900, color: "#6366f1" }}>{filtered.length}</span>
                    <span style={{ fontSize: 12, color: "#6b7280", marginLeft: 4 }}>gesamt</span>
                  </div>
                  {Object.entries(
                    filtered.reduce((acc, r) => {
                      const g = r.demographics?.geschlecht || "k";
                      acc[g] = (acc[g] || 0) + 1; return acc;
                    }, {})
                  ).map(([g, n]) => (
                    <div key={g}>
                      <span style={{ fontSize: 18, fontWeight: 800, color: "#374151" }}>{n}</span>
                      <span style={{ fontSize: 11, color: "#9ca3af", marginLeft: 3 }}>
                        {g === "m" ? "♂" : g === "w" ? "♀" : g === "d" ? "⚧" : "?"}
                      </span>
                    </div>
                  ))}
                </div>
              </div>

              {/* Actions */}
              <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
                <Btn small onClick={exportCSV}>📥 CSV Export</Btn>
                <Btn small danger onClick={clearAll}>🗑️ Alle löschen</Btn>
              </div>
            </>
          )}
        </div>
      )}

      {/* ─── RESULTS TAB ─── */}
      {tab === "results" && (
        <div>
          {filtered.length === 0 ? (
            <div style={{ textAlign: "center", padding: 40, color: "#9ca3af" }}>Keine Ergebnisse.</div>
          ) : (
            filtered.sort((a, b) => new Date(b.ts) - new Date(a.ts)).map(r => {
              const isOpen = expandedId === r.id;
              return (
                <div key={r.id} style={{
                  background: "#fff", border: "1px solid #e5e7eb", borderRadius: 12,
                  marginBottom: 8, overflow: "hidden",
                }}>
                  {/* Summary row */}
                  <div onClick={() => setExpandedId(isOpen ? null : r.id)} style={{
                    padding: "12px 14px", cursor: "pointer", display: "flex",
                    alignItems: "center", gap: 10,
                  }}>
                    <div style={{
                      width: 10, height: 10, borderRadius: 3,
                      background: r.dominant ? CAT[r.dominant].bg : "#ccc", flexShrink: 0,
                    }} />
                    <div style={{ flex: 1 }}>
                      <div style={{ fontSize: 14, fontWeight: 700, color: "#1e1b4b" }}>
                        {r.lebenswert?.name || "?"} — {r.vcode}
                      </div>
                      <div style={{ fontSize: 11, color: "#9ca3af" }}>
                        {r.demographics ? `${r.demographics.alter}J · ${r.demographics.geschlecht === "m" ? "♂" : r.demographics.geschlecht === "w" ? "♀" : r.demographics.geschlecht === "d" ? "⚧" : "?"} · Kl.${r.demographics.klasse}` : "Keine Demo"}
                        {" · "}{new Date(r.ts).toLocaleDateString("de-DE")} {new Date(r.ts).toLocaleTimeString("de-DE", { hour: "2-digit", minute: "2-digit" })}
                      </div>
                    </div>
                    <span style={{ fontSize: 16, color: "#9ca3af" }}>{isOpen ? "▲" : "▼"}</span>
                  </div>

                  {/* Expanded detail */}
                  {isOpen && (
                    <div style={{ padding: "0 14px 14px", borderTop: "1px solid #f3f4f6" }}>
                      <div style={{ display: "flex", flexWrap: "wrap", gap: 6, margin: "10px 0" }}>
                        {(r.allValues || []).map((v, i) => (
                          <span key={v.name} style={{
                            background: CAT[v.cat]?.bg || "#ccc", color: "#fff",
                            padding: "3px 10px", borderRadius: 8, fontSize: 12, fontWeight: 700,
                          }}>
                            {v.name}{i === 0 ? " ⭐" : i <= (r.superkraefte?.length || 0) ? " 💪" : ""}
                          </span>
                        ))}
                      </div>
                      <div style={{ fontSize: 12, color: "#6b7280", marginBottom: 8 }}>
                        Typ: <strong style={{ color: CAT[r.dominant]?.bg }}>{TYPE_DESC[r.dominant]?.title}</strong>
                      </div>
                      <button onClick={() => deleteResult(r.id)} style={{
                        background: "none", border: "none", color: "#ef4444",
                        fontSize: 12, cursor: "pointer", padding: 0, fontWeight: 600,
                      }}>🗑️ Löschen</button>
                    </div>
                  )}
                </div>
              );
            })
          )}
        </div>
      )}

      {/* ─── TAG CLOUD TAB ─── */}
      {tab === "cloud" && (
        <div>
          {Object.keys(valueCounts).length === 0 ? (
            <div style={{ textAlign: "center", padding: 40, color: "#9ca3af" }}>Keine Daten für die Tag-Cloud.</div>
          ) : (
            <div style={{
              background: "linear-gradient(140deg, #0a0a1a, #1e1b4b)",
              borderRadius: 20, padding: 28, minHeight: 300,
              display: "flex", flexWrap: "wrap", gap: 6,
              justifyContent: "center", alignItems: "center", alignContent: "center",
            }}>
              {Object.entries(valueCounts)
                .sort((a, b) => b[1].count - a[1].count)
                .map(([name, { count, cat }]) => {
                  const maxCount = Math.max(...Object.values(valueCounts).map(v => v.count));
                  const ratio = count / maxCount;
                  const fontSize = 11 + ratio * 28;
                  const opacity = 0.35 + ratio * 0.65;
                  return (
                    <span key={name} style={{
                      fontSize, fontWeight: ratio > 0.6 ? 800 : 600,
                      color: CAT[cat].bg,
                      opacity,
                      padding: "2px 6px",
                      textShadow: ratio > 0.5 ? `0 0 ${ratio * 12}px ${CAT[cat].bg}60` : "none",
                      transition: "all 0.2s ease",
                      cursor: "default",
                    }}
                      title={`${name}: ${count}× (${Math.round((count / filtered.length) * 100)}%)`}
                    >
                      {name}
                    </span>
                  );
                })
              }
            </div>
          )}

          {/* Cloud legend */}
          {Object.keys(valueCounts).length > 0 && (
            <div style={{ marginTop: 12, display: "flex", gap: 12, justifyContent: "center", flexWrap: "wrap" }}>
              {Object.entries(CAT).map(([cat, c]) => (
                <div key={cat} style={{ display: "flex", alignItems: "center", gap: 4, fontSize: 11, color: "#6b7280" }}>
                  <div style={{ width: 8, height: 8, borderRadius: 2, background: c.bg }} />
                  {c.label.split("·")[0].trim()}
                </div>
              ))}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

/* ═══════════════════════════════════════════
   MAIN APP
   ═══════════════════════════════════════════ */

function App() {
  const [values, setValues] = useState(DEFAULT_VALUES);
  const [loaded, setLoaded] = useState(false);
  const [phase, setPhase] = useState("intro");
  const [roundNum, setRoundNum] = useState(1);
  const [pile, setPile] = useState([]);
  const [lastLosers, setLastLosers] = useState([]);
  const [allLosers, setAllLosers] = useState([]);
  const [kompass, setKompass] = useState(null);
  const [valHistory, setValHistory] = useState({});
  const [demographics, setDemographics] = useState(null);
  const [saveError, setSaveError] = useState(null);
  const [typeDescs, setTypeDescs] = useState(TYPE_DESC);
  const [valueDescs, setValueDescs] = useState(VALUE_DESC);

  useEffect(() => {
    (async () => {
      try {
        const result = await window.storage.get(STORAGE_KEY);
        if (result && result.value) {
          const parsed = JSON.parse(result.value);
          if (Array.isArray(parsed) && parsed.length > 0) setValues(parsed);
        }
      } catch (e) {}
      if (USE_SUPABASE) {
        // Load wertetypen
        try {
          const rows = await supa.selectTable("wertetypen");
          if (rows && rows.length > 0) {
            const merged = {...TYPE_DESC};
            rows.forEach(function(row) {
              if (merged[row.cat]) {
                merged[row.cat] = {
                  title: row.title || merged[row.cat].title,
                  emoji: row.emoji || merged[row.cat].emoji,
                  short: row.short_desc || merged[row.cat].short,
                  text: row.long_desc || merged[row.cat].text,
                };
              }
            });
            setTypeDescs(merged);
          }
        } catch (e) { console.error("Wertetypen load error:", e); }
        // Load werte_beschreibungen
        try {
          const rows = await supa.selectTable("werte_beschreibungen");
          if (rows && rows.length > 0) {
            const merged = {...VALUE_DESC};
            rows.forEach(function(row) {
              if (row.name && row.beschreibung) merged[row.name] = row.beschreibung;
            });
            setValueDescs(merged);
          }
        } catch (e) { console.error("Werte-Beschreibungen load error:", e); }
      }
      setLoaded(true);
    })();
  }, []);

  const initGame = () => {
    setPile(shuffle(values));
    setAllLosers([]); setLastLosers([]);
    setRoundNum(1); setKompass(null);
    const h = {}; values.forEach(v => { h[v.name] = 0; });
    setValHistory(h);
  };

  const handleDemoSubmit = (demo) => {
    setDemographics(demo);
    initGame();
    setPhase("compare");
  };

  const saveAndShowResult = async (k, demo) => {
    const all = [k.lebenswert, ...k.superkraefte, ...k.grundwerte];
    const cc = {}; all.forEach(v => { cc[v.cat] = (cc[v.cat] || 0) + 1; });
    const dom = Object.entries(cc).sort((a, b) => b[1] - a[1])[0][0];
    const vc = all.map(v => VALUE_ABBR[v.name] || "?").join("·");

    if (USE_SUPABASE) {
      try {
        setSaveError(null);
        await supa.insert("results", {
          geschlecht: demo?.geschlecht || null,
          klassenstufe: demo?.klasse || null,
          schulform: demo?.schulform || null,
          lebenswert: k.lebenswert.name,
          lebenswert_cat: k.lebenswert.cat,
          superkraefte: k.superkraefte.map(v => ({ name: v.name, cat: v.cat })),
          grundwerte: k.grundwerte.map(v => ({ name: v.name, cat: v.cat })),
          all_values: all.map(v => ({ name: v.name, cat: v.cat })),
          dominant: dom,
          vcode: vc,
        });
      } catch(e) { setSaveError(e.message); console.error("Supabase save error:", e); }
    } else {
      try {
        const result = { id: Date.now().toString(36) + Math.random().toString(36).slice(2,6),
          ts: new Date().toISOString(), demographics: demo, lebenswert: k.lebenswert,
          superkraefte: k.superkraefte, grundwerte: k.grundwerte, allValues: all, dominant: dom, vcode: vc };
        let existing = [];
        try { const stored = await window.storage.get(RESULTS_KEY); if (stored?.value) existing = JSON.parse(stored.value); } catch(e) {}
        existing.push(result);
        await window.storage.set(RESULTS_KEY, JSON.stringify(existing));
      } catch(e) { console.error("Local save error:", e); }
    }
    setPhase("result");
  };

  const handleRestart = () => { setDemographics(null); setKompass(null); setPhase("intro"); };

  const MAX_ROUNDS = 3;

  const onCompare = (w, l) => {
    setLastLosers(l); setAllLosers(prev => [...prev, ...l]); setPile(w);
    setValHistory(prev => {
      const h = { ...prev };
      w.forEach(v => { h[v.name] = roundNum; });
      l.forEach(v => { if ((h[v.name] || 0) < roundNum - 1) h[v.name] = roundNum - 1; });
      return h;
    });
    // After max rounds OR ≤8 values: go to adjust
    if (w.length <= 8 || roundNum >= MAX_ROUNDS) setPhase("adjust");
    else setPhase("joker");
  };

  const onJoker = (jokers) => {
    const jn = new Set(jokers.map(j => j.name));
    setAllLosers(prev => prev.filter(d => !jn.has(d.name)));
    setLastLosers(prev => prev.filter(d => !jn.has(d.name)));
    const np = shuffle([...pile, ...jokers]);
    setValHistory(prev => {
      const h = { ...prev };
      jokers.forEach(v => { h[v.name] = roundNum; });
      return h;
    });
    setPile(np);
    // After max rounds OR ≤8 values: go to adjust
    if (np.length <= 8 || roundNum >= MAX_ROUNDS) setPhase("adjust");
    else { setRoundNum(r => r + 1); setPhase("compare"); }
  };

  const onAdjust = (final8) => {
    setValHistory(prev => {
      const h = { ...prev };
      final8.forEach(v => { h[v.name] = 99; });
      return h;
    });
    setPile(final8); setPhase("ranking");
  };

  const onRankDone = (ranked, goDeep) => {
    setPile(ranked);
    if (goDeep) {
      setPhase("kompass");
    } else {
      const autoKompass = {
        lebenswert: ranked[0],
        superkraefte: ranked.slice(1, 4),
        grundwerte: ranked.slice(4, 8),
      };
      setKompass(autoKompass);
      saveAndShowResult(autoKompass, demographics);
    }
  };

  const onKompass = async (r) => {
    setKompass(r);
    saveAndShowResult(r, demographics);
  };

  if (!loaded) return (
    <div style={{ display: "flex", justifyContent: "center", alignItems: "center", minHeight: "100vh", color: "#6b7280" }}>Laden…</div>
  );

  const maxRound = roundNum;
  const noHeader = ["intro","result","admin","admin-login","scan","demographics","dashboard"];

  var stepIdx = 0;
  if (phase === "compare" || phase === "joker") stepIdx = roundNum;
  if (phase === "adjust") stepIdx = 4;
  if (phase === "ranking") stepIdx = 5;
  if (phase === "kompass") stepIdx = 5;
  var steps = [
    { label: "Runde 1", done: stepIdx > 1 },
    { label: "Runde 2", done: stepIdx > 2 },
    { label: "Runde 3", done: stepIdx > 3 },
    { label: "Feinschliff", done: stepIdx > 4 },
    { label: "Ergebnis", done: stepIdx > 5 },
  ];

  return (
    <div style={{ maxWidth: 500, margin: "0 auto", minHeight: "100vh", fontFamily: "'Segoe UI',system-ui,-apple-system,sans-serif", background: "#fff" }}>
      {!noHeader.includes(phase) && (
        <div style={{ padding: "10px 16px 8px", borderBottom: "1px solid #f0f0f0" }}>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
            <div style={{ fontSize: 13, fontWeight: 800, color: "#2E2D8E" }}>Dein Wertespiel</div>
            <div style={{ fontSize: 11, color: "#9ca3af" }}>
              {phase === "compare" && "Vergleichen"}
              {phase === "joker" && "Joker wählen"}
              {phase === "adjust" && "Feinschliff"}
              {phase === "demographics" && "Über dich"}
              {phase === "ranking" && "Dein Ranking"}
              {phase === "kompass" && "Kompass bauen"}
            </div>
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: 2 }}>
            {steps.map(function(s, i) {
              var active = (i + 1) === stepIdx;
              var done = s.done;
              return (
                <div key={i} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: 3 }}>
                  <div style={{
                    height: 4, width: "100%", borderRadius: 4,
                    background: done ? "#2E2D8E" : active ? "linear-gradient(90deg, #2E2D8E, #2E2D8E80)" : "#e5e7eb",
                    transition: "all 0.3s ease",
                  }} />
                  <div style={{ fontSize: 9, color: active ? "#2E2D8E" : done ? "#2E2D8E" : "#c0c0c0", fontWeight: active ? 800 : 500 }}>
                    {s.label}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}
      {phase === "intro" && <Intro onStart={() => { setPhase("demographics"); }} valueCount={values.length} onAdmin={() => setPhase("admin-login")} onScan={() => { setPhase("scan"); }} />}
      {phase === "demographics" && <DemographicsForm onSubmit={handleDemoSubmit} />}
      {phase === "admin-login" && <AdminLogin onSuccess={function() { setPhase("admin"); }} onBack={function() { setPhase("intro"); }} />}
      {phase === "admin" && <AdminPanel values={values} setValues={setValues} onClose={() => setPhase("intro")} onDashboard={() => setPhase("dashboard")} typeDescs={typeDescs} setTypeDescs={setTypeDescs} valueDescs={valueDescs} setValueDescs={setValueDescs} />}
      {phase === "dashboard" && <AdminDashboard onBack={() => setPhase("admin")} />}
      {phase === "scan" && <PhotoScan
        onResult={(scanned) => {
          const h = {};
          values.forEach(v => { h[v.name] = 0; });
          scanned.forEach(v => { h[v.name] = 99; });
          setValHistory(h); setRoundNum(1);
          const pool = values.filter(v => !scanned.find(s => s.name === v.name));
          setLastLosers(pool); setPile(scanned);
          if (scanned.length === 8) setPhase("kompass");
          else setPhase("adjust");
        }}
        onBack={() => setPhase("intro")}
      />}
      {phase === "compare" && <Compare key={"r" + roundNum} pile={pile} roundNum={roundNum} onDone={onCompare} valueDescs={valueDescs} />}
      {phase === "joker" && <JokerPick losers={lastLosers} winnerCount={pile.length} onDone={onJoker} />}
      {phase === "adjust" && <FinalAdjust values8={pile} lastDiscards={lastLosers} onDone={onAdjust} />}
      {phase === "ranking" && <RankValues values8={pile} onDone={onRankDone} />}
      {phase === "kompass" && <KompassBuild values8={pile} onDone={onKompass} />}
      {phase === "result" && kompass && <Result kompass={kompass} onRestart={handleRestart} valHistory={valHistory} maxRound={maxRound} demographics={demographics} saveError={saveError} typeDescs={typeDescs} />}
    </div>
  );
}


ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
  </script>
</body>
</html>
