  <script type="text/babel">
const { useState, useEffect, useRef } = React;





var BLUE = "#2E2D8E";
var BLUE_DK = "#1C1B5E";
var PINK = "#E91E8C";
var CYAN = "#00BCD4";
var GREEN = "#7CC142";
var ORANGE = "#F7941D";
var TXT = "#2c2c3a";
var MUTED = "#6b6b80";
var WARM = "#faf8f5";
var HEAD = "'Outfit', system-ui, sans-serif";
var BANG = "'Bangers', 'Outfit', Impact, sans-serif";

/* Starburst SVG component */
function Starburst(props) {
  var pts = props.points || 16;
  var sz = props.size || 200;
  var clr = props.color || PINK;
  var coords = "";
  for (var i = 0; i < pts; i++) {
    var angle = (Math.PI * 2 / pts) * i - Math.PI / 2;
    var r = i % 2 === 0 ? 50 : 24;
    coords += (i === 0 ? "" : " ") + (50 + r * Math.cos(angle)).toFixed(1) + "," + (50 + r * Math.sin(angle)).toFixed(1);
  }
  return (
    <svg viewBox="0 0 100 100" width={sz} height={sz} style={{
      position: "absolute", pointerEvents: "none",
      top: props.top, left: props.left, right: props.right, bottom: props.bottom,
      opacity: props.opacity || 0.12, zIndex: 0,
    }}>
      <polygon points={coords} fill={clr} />
    </svg>
  );
}

/* Number badge with starburst */
function NumBadge(props) {
  return (
    <div style={{ position: "relative", width: 38, height: 38, flexShrink: 0 }}>
      <svg viewBox="0 0 100 100" width={38} height={38} style={{ position: "absolute", top: 0, left: 0 }}>
        <polygon points="50,0 62,30 97,30 70,52 80,88 50,68 20,88 30,52 3,30 38,30" fill={props.color || PINK} />
      </svg>
      <div style={{ position: "absolute", inset: 0, display: "flex", alignItems: "center", justifyContent: "center", color: "#fff", fontSize: 16, fontWeight: 900, fontFamily: HEAD }}>{props.num}</div>
    </div>
  );
}

function FadeIn(props) {
  var d = props.delay || 0;
  var ref = useRef(null);
  var s = useState(false);
  useEffect(function () {
    var el = ref.current;
    if (!el) return;
    var obs = new IntersectionObserver(function (entries) {
      if (entries[0].isIntersecting) s[1](true);
    }, { threshold: 0.08 });
    obs.observe(el);
    return function () { obs.disconnect(); };
  }, []);
  return (
    <div ref={ref} style={{
      opacity: s[0] ? 1 : 0,
      transform: s[0] ? "translateY(0)" : "translateY(22px)",
      transition: "opacity 0.55s ease " + d + "s, transform 0.55s ease " + d + "s",
    }}>
      {props.children}
    </div>
  );
}

function ImgBox(props) {
  var errState = useState(false);
  var hasError = errState[0];
  var setError = errState[1];
  var hasSrc = props.src && !hasError;
  var accent = props.accent || PINK;
  return (
    <div style={{
      aspectRatio: props.ratio || "21/9",
      minHeight: "clamp(180px, 22vw, 240px)",
      maxHeight: 320,
      borderRadius: 0,
      background: hasSrc ? "#0a0a14" : "linear-gradient(135deg, " + BLUE + "10, " + PINK + "06)",
      display: "flex", alignItems: "flex-start", justifyContent: "flex-start",
      border: "none", overflow: "hidden",
      position: "relative",
      width: "100vw", marginLeft: "calc(50% - 50vw)", marginRight: "calc(50% - 50vw)",
      marginTop: 0, marginBottom: "clamp(28px, 4vw, 50px)",
      boxShadow: "0 24px 60px -16px rgba(28,27,94,0.35)",
    }}>
      {hasSrc ? (
        <React.Fragment>
          <img src={props.src} alt={props.label || ""} onError={function() { setError(true); }} style={{ width: "100%", height: "100%", objectFit: "cover", position: "absolute", inset: 0 }} />
          {(props.quote || props.title) && <div style={{ position: "absolute", inset: 0, background: "linear-gradient(180deg, rgba(0,0,0,0.75) 0%, rgba(0,0,0,0.4) 40%, rgba(0,0,0,0.1) 70%, rgba(0,0,0,0) 100%)", pointerEvents: "none" }} />}
          {props.tag && <div style={{ position: "absolute", top: "clamp(20px, 3vw, 40px)", left: "max(24px, calc(50% - 550px))", background: accent, color: "#fff", fontSize: 12, fontWeight: 800, letterSpacing: 2, textTransform: "uppercase", padding: "6px 14px", borderRadius: 99, zIndex: 2 }}>{props.tag}</div>}
          {(props.quote || props.title) && (
            <div style={{ position: "relative", zIndex: 1, width: "100%", paddingTop: "clamp(28px, 6vw, 70px)" }}>
              <div style={{ maxWidth: 1100, margin: "0 auto", padding: "0 24px", color: "#fff" }}>
                {props.kicker && <div style={{ display: "inline-block", fontSize: 12, fontWeight: 800, color: "#fff", textTransform: "uppercase", letterSpacing: 3, background: accent, padding: "6px 14px", borderRadius: 99, marginBottom: 14 }}>{props.kicker}</div>}
                {props.title && <h2 style={{ fontFamily: BANG, fontSize: "clamp(30px, 5vw, 56px)", fontWeight: 400, letterSpacing: 2, lineHeight: 1.05, textTransform: "uppercase", color: "#fff", textShadow: "0 4px 20px rgba(0,0,0,0.5)", maxWidth: 860, margin: 0 }}>{props.title}</h2>}
                {props.quote && <div style={{ fontFamily: BANG, fontSize: "clamp(22px, 3.6vw, 44px)", letterSpacing: 1.5, lineHeight: 1.15, textTransform: "uppercase", textShadow: "0 2px 16px rgba(0,0,0,0.5)", maxWidth: 760, marginTop: 16 }}>{props.quote}</div>}
              </div>
            </div>
          )}
        </React.Fragment>
      ) : (
        <div style={{ textAlign: "center", color: MUTED, fontSize: 14, margin: "auto" }}>
          <div style={{ fontSize: 32, marginBottom: 4 }}>📸</div>
          <div style={{ fontWeight: 600 }}>{props.label || "Bild"}</div>
        </div>
      )}
    </div>
  );
}

/* Small fact callout that gets woven into sections */
function Fact(props) {
  var c = props.color || CYAN;
  var onDark = props.dark || props.grouped;
  return (
    <div style={{
      background: onDark ? "rgba(255,255,255,0.05)" : "#fff",
      borderRadius: 12, padding: "14px 18px", marginTop: 10,
      border: onDark ? "1px solid rgba(255,255,255,0.1)" : "1px solid " + c + "20",
      boxShadow: onDark ? "none" : "0 4px 14px -6px " + c + "40",
      position: "relative", overflow: "hidden", textAlign: "left",
    }}>
      <div style={{ position: "absolute", top: 0, left: 0, bottom: 0, width: 4, background: c }} />
      <div style={{ display: "flex", alignItems: "baseline", gap: "clamp(10px, 2vw, 16px)", flexWrap: "wrap", paddingLeft: 10 }}>
        <div style={{ fontFamily: BANG, fontSize: "clamp(22px, 3vw, 32px)", lineHeight: 1.1, letterSpacing: 1, color: c, minWidth: "fit-content" }}>{props.stat}</div>
        <div style={{ fontSize: "clamp(13px, 1.4vw, 14px)", color: onDark ? "rgba(255,255,255,0.85)" : TXT, lineHeight: 1.55, flex: "1 1 260px" }}>
          {props.text}
          {props.src ? <span style={{ fontSize: 11, color: onDark ? "rgba(255,255,255,0.45)" : MUTED, fontStyle: "italic", display: "block", marginTop: 4 }}>Quelle: {props.src}</span> : null}
        </div>
      </div>
    </div>
  );
}

function FactGroup(props) {
  return (
    <div style={{
      background: "linear-gradient(160deg, " + BLUE_DK + " 0%, " + BLUE + " 100%)",
      borderRadius: 22, padding: "clamp(22px, 3.5vw, 32px)", marginTop: 28,
      boxShadow: "0 16px 44px -18px rgba(28,27,94,0.5)",
      position: "relative", overflow: "hidden",
